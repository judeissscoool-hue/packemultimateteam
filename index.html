<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALL-TIME ULTIMATE — NBA Pack Opener v31</title>
<style>
/* ============ TOKENS: arena at night ============ */
:root{
  --bg:#121212; --panel:#171717; --panel2:#131313; --line:rgba(255,255,255,.08);
  --ink:#f2f2f5; --dim:#9a9aa5; --cyan:#35d6ff; --amber:#f2a93b; --green:#39ff9c;
  --bronze:#c08552; --silver:#c7cedb; --gold:#ffc53d; --elite:#ff4d6d;
  --icon1:#ffd7ef; --icon2:#ff7ac8; --icon3:#ffffff;
  --disp:'Impact','Haettenschweiler','Arial Narrow Bold','Arial Black',sans-serif;
  --body:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--ink);font-family:var(--body);min-height:100%}
body{background:
  radial-gradient(1200px 800px at 50% 0%, #1d1d1d 0%, #151515 45%, var(--bg) 100%);
  overflow-x:hidden}
body::before,body::after{content:"";position:fixed;border-radius:50%;filter:blur(70px);
  z-index:-1;pointer-events:none;opacity:.8}
body::before{width:560px;height:560px;left:-180px;top:12%;
  background:radial-gradient(circle,rgba(53,214,255,.10),transparent 65%);animation:drift1 26s ease-in-out infinite}
body::after{width:640px;height:640px;right:-220px;top:48%;
  background:radial-gradient(circle,rgba(255,122,200,.09),transparent 65%);animation:drift2 32s ease-in-out infinite}
@keyframes drift1{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(140px,-90px) scale(1.15)}}
@keyframes drift2{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-160px,110px) scale(1.12)}}
#neonart{position:fixed;inset:0;z-index:-2;pointer-events:none}
#neonart svg{width:100%;height:100%;display:block}
#neonart .glow-cyan{color:var(--cyan);filter:drop-shadow(0 0 7px var(--cyan))}
#neonart .glow-pink{color:#ff5cb8;filter:drop-shadow(0 0 7px #ff5cb8)}
#neonart .glow-green{color:var(--green);filter:drop-shadow(0 0 7px var(--green))}
#arena{position:fixed;inset:0;z-index:-1;pointer-events:none;overflow:hidden}
#arena::before,#arena::after{content:"";position:absolute;left:50%;top:46%;transform:translate(-50%,-50%);
  border-radius:50%;border:1.5px solid rgba(53,214,255,.08);animation:ringpulse 9s ease-in-out infinite}
#arena::before{width:78vmin;height:78vmin}
#arena::after{width:120vmin;height:120vmin;border-color:rgba(57,255,156,.07);animation-delay:-4.5s}
@keyframes ringpulse{0%,100%{transform:translate(-50%,-50%) scale(1);opacity:.7}50%{transform:translate(-50%,-50%) scale(1.06);opacity:1}}
.spark{position:absolute;border-radius:50%;opacity:0;animation:twinkle ease-in-out infinite}
@keyframes twinkle{0%,100%{opacity:0;transform:scale(.4)}50%{opacity:.85;transform:scale(1.4)}}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
h1,h2,h3,.disp{font-family:var(--disp);letter-spacing:.04em;text-transform:uppercase;font-weight:400}

/* ============ APP FRAME ============ */
#app{max-width:1180px;margin:0 auto;padding:12px 14px 90px}
header.top{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:8px 2px 14px;flex-wrap:wrap}
.logo{font-family:var(--disp);font-size:26px;letter-spacing:.06em;text-transform:uppercase;line-height:.95}
.logo em{font-style:normal;color:var(--amber)}
.logo small{display:block;font-family:var(--body);font-size:10px;letter-spacing:.28em;color:var(--dim)}
.hs{font-size:11px;color:var(--dim);text-align:right;line-height:1.5}
.hs b{color:var(--gold);font-family:var(--disp);font-size:15px;letter-spacing:.05em}

nav.tabs{display:flex;gap:6px;position:fixed;bottom:0;left:0;right:0;z-index:40;
  background:linear-gradient(to top,#121212 78%,rgba(18,18,18,0));padding:10px 14px 14px;justify-content:center}
nav.tabs button{flex:0 1 150px;padding:10px 8px;border-radius:10px;background:var(--panel);border:1px solid rgba(255,255,255,.08);
  font-family:var(--disp);letter-spacing:.08em;text-transform:uppercase;font-size:13px;color:var(--dim)}
nav.tabs button.on{color:#0c0c0c;background:var(--cyan);border-color:var(--cyan);box-shadow:0 0 18px rgba(53,214,255,.45)}

.panel{background:var(--panel);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:14px}
.rowhead{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px;gap:8px;flex-wrap:wrap}
.rowhead h2{font-size:18px;color:var(--ink)}
.rowhead .sub{font-size:11px;color:var(--dim)}
.btn{padding:9px 14px;border-radius:9px;background:var(--panel2);border:1px solid var(--line);font-size:13px;color:var(--ink)}
.btn:hover{border-color:var(--cyan)}
.btn.primary{background:var(--cyan);color:#0c0c0c;border-color:var(--cyan);font-family:var(--disp);letter-spacing:.06em;text-transform:uppercase}
.btn.danger{border-color:#5c2233;color:#ff8aa0}
.btn.gold{background:linear-gradient(135deg,#3a2f12,#241d0c);border-color:var(--gold);color:var(--gold)}
.btn:disabled{opacity:.4;cursor:not-allowed}

/* ============ SCOREBOARD (team OVR / chem / projection) ============ */
.scoreboard{display:grid;grid-template-columns:auto 1fr auto;gap:14px;align-items:center}
@media(max-width:820px){.scoreboard{grid-template-columns:auto 1fr}
  .chemlegend{grid-column:1/-1;border-left:none;border-top:1px solid rgba(255,255,255,.08);padding:10px 0 0;min-width:0;
    display:grid;grid-template-columns:1fr 1fr;gap:6px 14px}
  .chemlegend .clg-h{grid-column:1/-1}}
.ovrbig{font-family:var(--disp);font-size:64px;line-height:1;color:var(--gold);text-shadow:0 0 24px rgba(255,197,61,.35);min-width:110px;text-align:center;transition:transform .25s}
.ovrbig.bump{transform:scale(1.18)}
.ovrbig small{display:block;font-size:10px;letter-spacing:.3em;color:var(--dim);font-family:var(--body);margin-top:2px}
.ovrbig small.exact{color:var(--gold);letter-spacing:.14em;font-size:11.5px;margin-top:4px;text-shadow:0 0 8px rgba(255,197,61,.45)}
.projrow{display:flex;flex-wrap:wrap;gap:14px;font-size:12px;color:var(--dim)}
.projrow b{display:block;color:var(--ink);font-size:15px;font-family:var(--disp);letter-spacing:.05em}
.chemlinks{margin-top:6px;font-size:11px;color:var(--dim);display:flex;gap:6px;flex-wrap:wrap}
.chemlinks span{background:var(--panel2);border:1px solid var(--line);padding:2px 8px;border-radius:20px}

.recordid{margin-top:9px;border:1px solid rgba(255,255,255,.10);background:linear-gradient(135deg,rgba(255,255,255,.035),rgba(255,255,255,.012));border-radius:10px;padding:8px 10px;display:flex;align-items:center;justify-content:space-between;gap:10px;overflow:hidden;position:relative}
.recordid::after{content:"";position:absolute;inset:0;pointer-events:none;background:linear-gradient(105deg,transparent 0 42%,rgba(255,255,255,.05) 50%,transparent 58% 100%);transform:translateX(-120%)}
.recordid .rid-main{font-family:var(--disp);font-size:18px;letter-spacing:.07em;text-transform:uppercase;line-height:1}
.recordid .rid-sub{font-size:9px;letter-spacing:.14em;color:var(--dim);text-transform:uppercase;margin-top:4px}
.recordid .rid-record{font-family:var(--disp);font-size:24px;letter-spacing:.04em;white-space:nowrap}
.recordid.rid-playoff{border-color:rgba(53,214,255,.32)}
.recordid.rid-contender{border-color:rgba(255,197,61,.38);box-shadow:0 0 14px rgba(255,197,61,.08) inset}
.recordid.rid-great{border-color:rgba(255,122,200,.48);box-shadow:0 0 18px rgba(255,122,200,.10) inset}
.recordid.rid-near{border-color:rgba(242,169,59,.72);box-shadow:0 0 18px rgba(242,169,59,.16),0 0 20px rgba(242,169,59,.08) inset}
.recordid.rid-near .rid-main,.recordid.rid-near .rid-record{color:var(--amber)}
.recordid.rid-perfect{border:1px solid var(--gold);background:linear-gradient(135deg,#3a2f12,#1b1609 58%,#33250d);box-shadow:0 0 24px rgba(255,197,61,.34),0 0 30px rgba(255,197,61,.18) inset;animation:clubpulse 1.8s ease-in-out infinite}
.recordid.rid-perfect::after{animation:clubshine 2.8s ease-in-out infinite}
.recordid.rid-perfect .rid-main,.recordid.rid-perfect .rid-record{color:var(--gold);text-shadow:0 0 12px rgba(255,197,61,.5)}
.recordid.rid-perfect .rid-sub{color:#f9dfa0}
@keyframes clubpulse{0%,100%{box-shadow:0 0 20px rgba(255,197,61,.25),0 0 28px rgba(255,197,61,.12) inset}50%{box-shadow:0 0 32px rgba(255,197,61,.46),0 0 38px rgba(255,197,61,.22) inset}}
@keyframes clubshine{0%,30%{transform:translateX(-120%)}65%,100%{transform:translateX(120%)}}
.clubstamp{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--gold);border-radius:999px;padding:5px 10px;background:#2b210b;color:var(--gold);font-family:var(--disp);font-size:12px;letter-spacing:.12em;text-transform:uppercase;box-shadow:0 0 16px rgba(255,197,61,.25)}
:root{--ck-team:#ffc53d;--ck-duo:#ff4d6d;--ck-story:#ff7ac8;--ck-era:#35d6ff;--ck-style:#39ff9c}
/* chem web segments: icon-rim style bloom, strength ascends with rank */
.squadweb .wl{stroke-linecap:round;animation:webpulse var(--ws,2s) ease-in-out infinite}
.wl-style{stroke-width:2.6;--wo:.6;--wo2:.78;--ws:2.6s;
  filter:drop-shadow(0 0 3px var(--ck-style))}
.wl-era{stroke-width:2.8;--wo:.66;--wo2:.85;--ws:2.2s;
  filter:drop-shadow(0 0 4px var(--ck-era)) drop-shadow(0 0 9px rgba(53,214,255,.45))}
.wl-story{stroke-width:3.4;--wo:.75;--wo2:.95;--ws:1.7s;
  filter:drop-shadow(0 0 6px var(--ck-story)) drop-shadow(0 0 14px rgba(255,122,200,.65))}
.wl-team{stroke-width:4;--wo:.82;--wo2:1;--ws:1.3s;
  filter:drop-shadow(0 0 7px var(--ck-team)) drop-shadow(0 0 18px rgba(255,197,61,.75)) drop-shadow(0 0 30px rgba(255,197,61,.35))}
@keyframes webpulse{0%,100%{opacity:var(--wo,.8)}50%{opacity:var(--wo2,1)}}
.chemlinks span.hot{border-color:var(--amber);color:var(--amber)}
.chemlinks span.story{border-color:#ff7ac8;color:#ffb3e0}
.chemlinks span.ck-team{border-color:var(--ck-team);color:var(--ck-team)}
.chemlinks span.ck-duo{border-color:var(--ck-duo);color:#ff98a8}
.chemlinks span.ck-story{border-color:var(--ck-story);color:#ffb3e0}
.chemlinks span.ck-era{border-color:var(--ck-era);color:#8ee6ff}
.chemlinks span.ck-style{border-color:var(--ck-style);color:#8fffc8}
.chemlegend{border-left:1px solid rgba(255,255,255,.08);padding-left:14px;display:flex;flex-direction:column;gap:6px;min-width:200px}
.clg-h{font-size:9px;letter-spacing:.28em;color:var(--dim)}
.clg{display:flex;gap:8px;align-items:flex-start}
.clg i{width:16px;height:3px;border-radius:2px;margin-top:5px;flex:0 0 auto}
.clg.ck-team i{background:var(--ck-team);box-shadow:0 0 10px var(--ck-team),0 0 3px var(--ck-team)}
.clg.ck-story i{background:var(--ck-story);box-shadow:0 0 7px var(--ck-story)}
.clg.ck-era i{background:var(--ck-era);box-shadow:0 0 4px var(--ck-era)}
.clg.ck-style i{background:var(--ck-style);box-shadow:0 0 2.5px var(--ck-style)}
.clg b{font-size:10.5px;display:block;letter-spacing:.04em}
.clg.ck-team b{color:var(--ck-team)}.clg.ck-duo b{color:var(--ck-duo)}.clg.ck-story b{color:var(--ck-story)}
.clg.ck-era b{color:var(--ck-era)}.clg.ck-style b{color:var(--ck-style)}
.clg span{font-size:8.5px;color:var(--dim);line-height:1.35;display:block}


.near82{margin-top:9px;padding:8px 11px;border:1px solid var(--elite);border-radius:9px;background:linear-gradient(135deg,rgba(255,77,109,.14),rgba(242,169,59,.08));color:#ff9cad;font-family:var(--disp);font-size:15px;letter-spacing:.08em;text-align:center;text-transform:uppercase;box-shadow:0 0 15px rgba(255,77,109,.16)}
.near82 b{color:var(--gold);font-size:18px;text-shadow:0 0 10px rgba(255,197,61,.35)}
.near82.hit{border-color:var(--green);color:var(--green);background:rgba(57,255,156,.08);box-shadow:0 0 18px rgba(57,255,156,.18)}

/* ============ COURT ROSTER ============ */
.court{position:relative;border:1px solid rgba(255,255,255,.09);border-radius:14px;overflow:hidden;
  background:linear-gradient(180deg,rgba(24,24,24,.9) 0%,rgba(17,17,17,.9) 100%);padding:18px 10px 14px;margin-top:12px}
.court::before{content:"";position:absolute;left:50%;top:-90px;transform:translateX(-50%);
  width:340px;height:340px;border-radius:50%;border:2px solid rgba(57,255,156,.12);pointer-events:none}
.court::after{content:"";position:absolute;left:50%;top:0;transform:translateX(-50%);
  width:2px;height:100%;background:rgba(255,255,255,.05);pointer-events:none}
.court h3{position:relative;text-align:center;font-size:12px;letter-spacing:.3em;color:var(--dim);margin-bottom:10px;z-index:2}
.squadweb{position:absolute;inset:0;width:100%;height:100%;z-index:1;pointer-events:none}
.fiveslots,.benchrow,.benchlabel{position:relative;z-index:2}
.fiveslots{position:relative;display:grid;grid-template-areas:". c ." "f1 . f2" "g1 . g2";
  grid-template-columns:1fr 1fr 1fr;gap:8px;justify-items:center}
.slot-C{grid-area:c}.slot-PF{grid-area:f1}.slot-SF{grid-area:f2}.slot-SG{grid-area:g1}.slot-PG{grid-area:g2}
.pickgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(96px,1fr));gap:8px;max-height:52vh;overflow-y:auto;padding:4px 2px}
.pickgrid .card{width:100%}
.coll .c3d,.pickgrid .c3d,.draftopts .c3d,.coll .flame,.pickgrid .flame,.draftopts .flame{width:100%}
.benchrow{display:flex;gap:8px;justify-content:center;margin-top:14px;flex-wrap:wrap}
.benchlabel{width:100%;text-align:center;font-size:10px;letter-spacing:.3em;color:var(--dim);margin-top:12px}

/* ============ CARDS ============ */
.slot{width:104px;min-height:148px;border:1.5px dashed var(--line);border-radius:12px;display:flex;
  align-items:center;justify-content:center;flex-direction:column;gap:4px;color:var(--dim);
  font-size:10px;letter-spacing:.15em;text-transform:uppercase;background:rgba(10,10,10,.45);position:relative;transition:all .18s;font-family:var(--body)}
.slot .postag{font-family:var(--disp);font-size:18px;letter-spacing:.1em;color:#4a4a52}
.slot.eligible{border-color:var(--cyan);color:var(--cyan);box-shadow:0 0 14px rgba(53,214,255,.35);animation:pulse 1s infinite}
.blocked{opacity:.35}
.droptarget{outline:2px dashed var(--cyan);outline-offset:3px;border-radius:14px}
.dragsrc{opacity:.45}
.fromtag{position:absolute;top:5px;left:6px;font-size:8px;background:var(--amber);color:#0c0c0c;font-weight:800;border-radius:8px;padding:1px 5px;letter-spacing:.05em}
@keyframes pulse{0%,100%{box-shadow:0 0 8px rgba(53,214,255,.25)}50%{box-shadow:0 0 20px rgba(53,214,255,.6)}}

.card{width:104px;height:158px;border-radius:12px;padding:7px 7px 6px;position:relative;display:flex;flex-direction:column;
  background:var(--panel2);border:1.5px solid var(--line);user-select:none;cursor:pointer;overflow:hidden;transition:transform .12s}
.card:active{transform:scale(.96)}
/* ---- card art layer ---- */
.card.hasart{background:#0a0a0a}
.cardart{position:absolute;inset:0;background-size:cover;background-position:center top;z-index:0}
.cardart-fade{position:absolute;inset:0;z-index:1;background:linear-gradient(to bottom,rgba(0,0,0,.15) 0%,rgba(0,0,0,0) 32%,rgba(0,0,0,.55) 70%,rgba(0,0,0,.9) 100%)}
.card.hasart .card-top,.card.hasart .infobtn,.card.hasart .nm,.card.hasart .meta{position:relative;z-index:2}
.card.hasart .ovr{text-shadow:0 2px 6px rgba(0,0,0,.9)}
.card.hasart .pos{color:#e8e8ec;text-shadow:0 1px 4px rgba(0,0,0,.9)}
.card.hasart .nm{text-shadow:0 1px 6px rgba(0,0,0,.95)}
.card.hasart .meta{color:#d8d8e0;text-shadow:0 1px 4px rgba(0,0,0,.9)}
.card .ovr{font-family:var(--disp);font-size:26px;line-height:1;letter-spacing:.02em}
.card .pos{letter-spacing:.08em;color:var(--dim);white-space:nowrap}
.card .ini{margin:4px auto 2px;width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-family:var(--disp);font-size:17px;background:#0d0d0d;border:1.5px solid var(--line);letter-spacing:.02em}
.card .nm{font-size:10.5px;font-weight:700;text-align:center;line-height:1.15;margin-top:auto;min-height:24px;display:flex;align-items:center;justify-content:center}
.card .meta{font-size:8px;color:var(--dim);text-align:center;letter-spacing:.06em;margin-top:2px}
/* ---- 3D flip structure ---- */
.c3d{perspective:800px;position:relative}
.c3din{position:relative;transform-style:preserve-3d;transition:transform .45s cubic-bezier(.3,.8,.3,1)}
.c3din.flipped3{transform:rotateY(180deg)}
.c3face{backface-visibility:hidden;-webkit-backface-visibility:hidden}
.c3front{position:relative}
.c3back{position:absolute;inset:0;transform:rotateY(180deg)}
.infobtn{position:absolute;top:4px;right:5px;width:17px;height:17px;border-radius:50%;z-index:5;
  font-size:11px;line-height:15px;text-align:center;color:var(--dim);
  border:1px solid rgba(255,255,255,.18);background:rgba(0,0,0,.4);padding:0}
.infobtn:hover{color:var(--cyan);border-color:var(--cyan)}
.cardback{width:100%;height:100%;border-radius:12px;background:#121212;border:1.5px solid rgba(255,255,255,.14);
  padding:8px 8px 6px;display:flex;flex-direction:column;gap:2px;cursor:pointer;overflow:hidden;text-align:left}
.cardback .bk-nm{font-family:var(--disp);font-size:11px;letter-spacing:.05em;text-transform:uppercase}
.cardback .bk-sub{font-size:7px;color:var(--dim);margin-bottom:2px}
.cardback .bk-lab{font-size:6.2px;letter-spacing:.22em;text-transform:uppercase;color:#6f6f78;margin-top:3px}
.cardback .bk-val{font-size:7.6px;line-height:1.35;color:var(--ink)}
.cardback .bk-flip{margin-top:auto;font-size:6.5px;letter-spacing:.15em;color:#6f6f78;text-align:center}
.bk-Bronze{border-color:var(--bronze)}.bk-Bronze .bk-nm{color:var(--bronze)}
.bk-Silver{border-color:var(--silver)}.bk-Silver .bk-nm{color:var(--silver)}
.bk-Gold{border-color:var(--gold)}.bk-Gold .bk-nm{color:var(--gold)}
.bk-Elite{border-color:var(--elite)}.bk-Elite .bk-nm{color:var(--elite)}
.bk-Icon{border-color:var(--icon2)}.bk-Icon .bk-nm{color:#ffc4e6}
.card .cnt{position:absolute;top:5px;left:6px;font-size:9px;background:var(--cyan);color:#06121a;font-weight:800;border-radius:8px;padding:1px 5px}

.t-Bronze{border-color:var(--bronze)} .t-Bronze .ovr{color:var(--bronze)} .t-Bronze .ini{border-color:var(--bronze)}
.t-Silver{border-color:var(--silver);background:linear-gradient(160deg,#202024,#131316)} .t-Silver .ovr{color:var(--silver)} .t-Silver .ini{border-color:var(--silver)}
.t-Gold{border-color:var(--gold);background:linear-gradient(160deg,#241d0a,#141210);box-shadow:0 0 10px rgba(255,197,61,.18)}
.t-Gold .ovr{color:var(--gold)} .t-Gold .ini{border-color:var(--gold)}
.t-Elite{border-color:var(--elite);background:linear-gradient(160deg,#2a0f1a,#150b12);box-shadow:0 0 14px rgba(255,77,109,.3)}
.t-Elite .ovr{color:var(--elite)} .t-Elite .ini{border-color:var(--elite);box-shadow:0 0 10px rgba(255,77,109,.5) inset}
.t-Icon{border:2px solid transparent;background:
  linear-gradient(160deg,#241322,#160d18) padding-box,
  linear-gradient(120deg,var(--icon2),var(--icon3),var(--icon1),var(--icon2)) border-box;
  box-shadow:0 0 22px rgba(255,140,205,.55)}
.t-Icon .ovr{background:linear-gradient(180deg,#ffffff,var(--icon2));-webkit-background-clip:text;background-clip:text;color:transparent}
.t-Icon .ini{border-color:var(--icon2);background:#2a1526;color:#ffd7ef}
.t-Icon::after{content:"";position:absolute;top:-60%;left:-60%;width:70%;height:220%;transform:rotate(22deg);
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.32),transparent);animation:sheen 3.2s infinite}
@keyframes sheen{0%{left:-70%}55%{left:130%}100%{left:130%}}
/* pink flame aura wrapping every Icon card */
.flame{position:relative;z-index:0;border-radius:14px}
.flame::before,.flame::after{content:"";position:absolute;z-index:-1;border-radius:18px;pointer-events:none}
.flame::before{inset:-9px;filter:blur(11px);opacity:.75;
  background:conic-gradient(from 0deg,#ff5cb8,#fff,#ff9ad5,#ff2fa4,#ffd7ef,#ff5cb8);
  animation:flamespin 3.2s linear infinite,flick 1.1s ease-in-out infinite}
.flame::after{inset:-4px;filter:blur(4px);opacity:.55;

.hub-scoreboard{grid-template-columns:104px minmax(0,1fr);align-items:start;gap:12px}

.unlocktoast{position:fixed;right:14px;top:14px;z-index:120;width:min(340px,calc(100vw - 28px));background:#17130a;border:1px solid var(--gold);border-radius:14px;padding:14px;box-shadow:0 0 28px rgba(255,197,61,.32);animation:toastin .35s ease-out}.unlocktoast b{color:var(--gold);font-family:var(--disp);letter-spacing:.05em}.unlocktoast span{display:block;font-size:11px;color:#d5d1c6;margin-top:4px}@keyframes toastin{from{transform:translateY(-20px);opacity:0}}

  let d=Array.isArray(TIER_DECKS[t])?TIER_DECKS[t].filter((id,i,a)=>valid.has(id)&&a.indexOf(id)===i):[];

  if(missing.length){shuffleInPlace(missing,rng);d.push(...missing);shuffleInPlace(d,rng);}

function sSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){MEM[k]=v;}}
function sDel(k){try{localStorage.removeItem(k);}catch(e){delete MEM[k];}}

/* ---- save sanitizer: heals saves from older versions ----
   Card ids are DB array indexes, and the DB grew/reordered across updates.
   A stale save can hold ids that no longer exist (or an old-schema side missing
   roster/coll), which used to throw mid-click and leave slots blank. Every load:
   rebuild anything malformed and drop ids that don't resolve to a card. */
function sanitizeSave(){
  const mk={main:emptySide,rare:emptySide,classic:emptyClassic};
  Object.entries(mk).forEach(([k,maker])=>{
    if(!S[k]||typeof S[k]!=="object")S[k]=maker();
    const sd=S[k];
    if(!sd.roster||typeof sd.roster!=="object")sd.roster=emptyRoster();
    ALL_SLOTS.forEach(s=>{
      if(sd.roster[s]===undefined)sd.roster[s]=null;
      const id=sd.roster[s];
      if(id!=null&&(!Number.isInteger(id)||!DB[id]))sd.roster[s]=null;
    });
    if(!sd.coll||typeof sd.coll!=="object")sd.coll={};
    Object.keys(sd.coll).forEach(id=>{
      if(!DB[id]||!(sd.coll[id]>0))delete sd.coll[id];
    });
  });
  /* trophy ledgers keyed by card id: drop entries that no longer resolve */
  if(typeof T!=="undefined"&&T&&T.seenCards)
    Object.keys(T.seenCards).forEach(id=>{if(!DB[id])delete T.seenCards[id];});
  if(typeof RECENT!=="undefined")
    RECENT=Array.isArray(RECENT)?RECENT.map(pk=>Array.isArray(pk)?pk.filter(id=>DB[id]):[]).filter(pk=>pk.length):[];
}

function setProgress(required){const own=ownedNames(),available=required.filter(n=>DB.some(p=>p.name===n)),unavailable=required.filter(n=>!DB.some(p=>p.name===n)),miss=available.filter(n=>!own.has(n));const out=trophyProgress(available.length-miss.length,Math.max(1,available.length),miss);out.unavailable=unavailable;return out;}
/* softened completion: an entry counts as complete when you own a threshold share of the
   AVAILABLE members (default ~60%, min the whole available set when it is tiny). This keeps
   entries with a couple of not-yet-added role players fully achievable. */
function setTarget(required){const available=required.filter(n=>DB.some(p=>p.name===n));const need=available.length<=3?available.length:Math.max(3,Math.ceil(available.length*0.6));return {available:available.length,need};}
function setProgressSoft(required){const own=ownedNames(),t=setTarget(required),have=required.filter(n=>own.has(n)).length,available=required.filter(n=>DB.some(p=>p.name===n)),miss=available.filter(n=>!own.has(n));const out=trophyProgress(Math.min(have,t.need),Math.max(1,t.need),miss);out.unavailable=required.filter(n=>!DB.some(p=>p.name===n));return out;}

/* A date-seeded DRAFT: everyone gets the same challenge + the same option boards each day.
   Tap each slot to reveal draft options drawn from the day's seeded pool, filtered by the
   day's ban (so banned cards are never even offered). Blocked submission if the final
   board violates the constraint. Streak + personal best persist. */
const DAILY_KEY="atu-daily-v1";

function xmur3(str){let h=1779033703^str.length;for(let i=0;i<str.length;i++){h=Math.imul(h^str.charCodeAt(i),3432918353);h=h<<13|h>>>19;}return function(){h=Math.imul(h^h>>>16,2246822507);h=Math.imul(h^h>>>13,3266489909);return (h^=h>>>16)>>>0;};}

function todayKey(d){d=d||new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}

/* One Franchise rotates across these four — deepest rosters with real star power */
const FRANCHISE_CYCLE=["LAL","BOS","GSW","PHX"];
let DD_FRANCHISE=null;
function dailyFor(dateKey){dateKey=dateKey||todayKey();return DAILY_CYCLE[((dayIndex(dateKey)%DAILY_CYCLE.length)+DAILY_CYCLE.length)%DAILY_CYCLE.length];}

/* ---- date-seeded draft pool: filtered by the day's ban, guaranteed constraint-solvable ---- */
function dailyDraftPool(dateKey){
  dateKey=dateKey||todayKey();
  const ch=dailyFor(dateKey),rng=seededRng("pool-"+dateKey);
  const shuf=arr=>{const a=arr.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(rng()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;};
  /* eraLock challenges: pick THE decade for this day (rotates), then ban every other era */
  let lockedEra=null;
  if(ch.eraLock){const eras=viableEras();lockedEra=eras[dayIndex(dateKey)%eras.length];}
  const banned=p=>(ch.ban&&ch.ban(p))||(lockedEra&&p.era!==lockedEra);
  let base=DB.filter(p=>!banned(p));
  /* franchise-lock: restrict to ONE seeded team that can fill all five slots */
  if(ch.franchiseLock){
    /* rotate through the four deepest, most star-loaded franchises so each One Franchise
       day is a recognisable team with enough depth to draft a real squad */
    const teams={};base.forEach(p=>{(teams[p.team]=teams[p.team]||[]).push(p);});
    const cycle=FRANCHISE_CYCLE.filter(t=>teams[t]&&STARTER_SLOTS.every(s=>teams[t].some(p=>eligible(p,s))));
    /* index by which OCCURRENCE of this challenge it is, not the raw day number:
       challenges recur every 14 days and 14 mod 4 aliases to only two of the four teams */
    const occ=Math.floor(dayIndex(dateKey)/DAILY_CYCLE.length);
    let pick=cycle.length?cycle[((occ%cycle.length)+cycle.length)%cycle.length]:null;
    if(!pick){ /* fallback: any viable team */
      const viable=Object.entries(teams).filter(([t,a])=>STARTER_SLOTS.every(s=>a.some(p=>eligible(p,s))));
      pick=shuf(viable.map(v=>v[0]))[0];
    }
    base=teams[pick]||base;
    DD_FRANCHISE=pick;
  }
  const ids=new Set(base.map(p=>p.id));
  const inject=names=>names.forEach(n=>{const c=DB.find(p=>p.name===n);if(c&&!banned(c)&&!ids.has(c.id)){base.push(c);ids.add(c.id);}});
  if(ch.seedTrio){const trios=DUOS.filter(g=>g.m.length===3);inject(shuf(trios)[0].m);}
  if(ch.seedBonds){shuf(DUOS).slice(0,ch.seedBonds).forEach(g=>inject(g.m));}
  if(ch.id==="decade-lock"){ /* guarantee one decade can fill all five starter slots */
    const eras={};base.forEach(p=>{(eras[p.era]=eras[p.era]||[]).push(p);});
    const viable=Object.entries(eras).filter(([e,a])=>STARTER_SLOTS.every(s=>a.some(p=>eligible(p,s))));
    if(!viable.length){ /* force one: pick the era with most players, top up missing slots from DB */
      const era=shuf(Object.keys(eras))[0]||"'10s";
      STARTER_SLOTS.forEach(s=>{if(!(eras[era]||[]).some(p=>eligible(p,s))){const c=shuf(DB.filter(p=>p.era===era&&eligible(p,s)&&!(ch.ban&&ch.ban(p))))[0];if(c&&!ids.has(c.id)){base.push(c);ids.add(c.id);}}});
    }
  }
  if(ch.id==="positionless"){ /* ensure 5 distinct primary positions exist */
    ["PG","SG","SF","PF","C"].forEach(pos=>{if(!base.some(p=>p.pos===pos)){const c=shuf(DB.filter(p=>p.pos===pos&&!(ch.ban&&ch.ban(p))))[0];if(c&&!ids.has(c.id)){base.push(c);ids.add(c.id);}}});
  }
  if(ch.id==="rivalry"){ /* ensure 4+ distinct teams that can cover slots */
    const teams=[...new Set(base.map(p=>p.team))];if(teams.length<5){shuf(DB).slice(0,20).forEach(c=>{if(!ids.has(c.id)&&!(ch.ban&&ch.ban(c))){base.push(c);ids.add(c.id);}});}
  }
  return {pool:base,rng:seededRng("boards-"+dateKey)};
}

/* ---- daily draft state (mirrors D, but seeded + pool-restricted) ---- */
let DD=null;
function dailyEligiblePool(slot){return DD.pool.filter(p=>eligible(p,slot));}
/* ---- POOL-RELATIVE RARITY ----
   Whatever the day bans, the pull still feels like a draft: the day's own pool is
   ranked by OVR and split into five bands that inherit the draft's rarity odds.
   On "Underdog" (nothing 90+) the 89s BECOME the Icons — a 2% thrill — while the
   bottom of that pool becomes the common band. Same for Silver&Below, Grit&Grind, etc. */
const DAILY_BAND_SHARE={Icon:.04,Elite:.10,Gold:.30,Silver:.36,Bronze:.20}; /* size of each band */
/* Re-banding is ONLY for challenges that cut off the top of the rating range
   (Underdog, Silver&Below, Grit&Grind, No Icons). Those pools have no real Icons,
   so we promote their best players into the rare band to keep the pull exciting.
   Era/roster-shape challenges (Rookie Szn, Decade Lock, One Franchise, Rivalry...)
   still contain genuine Icons — their real tiers already work, so leave them be. */
function dailyNeedsReband(){
  if(DD._reband!==undefined)return DD._reband;
  /* if the pool is missing the top tiers, the rarity curve has collapsed — rebuild it */
  /* Reband only when the pool has NO rare tier left at all. Losing just Icons is
     fine — Elites still provide a genuine rare pull (e.g. "No Icons" keeps 52). */
  const hasIcon=DD.pool.some(p=>p.tier==="Icon");
  const hasElite=DD.pool.some(p=>p.tier==="Elite");
  DD._reband=!hasIcon&&!hasElite;
  return DD._reband;
}
function dailyBands(){
  if(DD._bands)return DD._bands;
  const order=["Icon","Elite","Gold","Silver","Bronze"];
  const bands={};
  if(!dailyNeedsReband()){ /* real tiers intact — use them as-is */
    order.forEach(t=>bands[t]=DD.pool.filter(p=>p.tier===t));
    /* if a top tier is empty (e.g. "No Icons"), promote the next real tier into it so the
       rare roll still lands on the pool's genuine best rather than falling through */
    for(let i=0;i<order.length-1;i++){
      if(!bands[order[i]].length){
        const next=order.slice(i+1).find(t=>bands[t].length);
        if(next){bands[order[i]]=bands[next];bands[next]=[];}
      }
    }
    DD._bands=bands;return bands;
  }
  const ranked=DD.pool.slice().sort((a,b)=>b.ovr-a.ovr||a.name.localeCompare(b.name));
  const n=ranked.length;let i=0;
  order.forEach((t,k)=>{
    const count=(k===order.length-1)?n-i:Math.max(1,Math.round(n*DAILY_BAND_SHARE[t]));
    bands[t]=ranked.slice(i,i+count);i+=count;
  });
  DD._bands=bands;return bands;
}
function dailyBandOf(p){
  const b=dailyBands();
  for(const t of ["Icon","Elite","Gold","Silver","Bronze"])if(b[t].some(x=>x.id===p.id))return t;
  return "Silver";
}
/* ---- bond surfacing ----
   Duo Hunt / Dynasty are impossible if partners never appear together: with 5-card
   boards drawn from hundreds of players, the odds of being offered BOTH halves of a
   bond are effectively nil. So on bond challenges we actively surface partners:
   once you've drafted half a bond, the missing member(s) get a guaranteed slot on
   later boards whenever they're position-eligible. Before any bond is started, we
   seed one member of the day's target bond so the chain has somewhere to begin. */
function dailyBondTargets(slot,taken){
  const ch=DD.challenge;
  if(!(ch.id==="duo-hunt"||ch.id==="dynasty"))return [];
  const drafted=new Set(ALL_SLOTS.map(s=>DD.roster[s]).filter(x=>x!=null).map(id=>DB[id].name));
  const wantTrio=ch.id==="dynasty";
  const groups=DUOS.filter(g=>wantTrio?g.m.length===3:true);
  const out=[];
  /* 1) partners of bonds already started */
  groups.forEach(g=>{
    const have=g.m.filter(n=>drafted.has(n)).length;
    if(have>0&&have<g.m.length){
      g.m.filter(n=>!drafted.has(n)).forEach(n=>{
        const c=DD.pool.find(p=>p.name===n&&eligible(p,slot)&&!taken.has(p.name));
        if(c)out.push(c);
      });
    }
  });
  if(out.length)return out;
  /* 2) nothing started yet — offer an entry point into a bond that's fully available */
  const viable=groups.filter(g=>g.m.every(n=>DD.pool.some(p=>p.name===n)));
  for(const g of viable){
    for(const n of g.m){
      const c=DD.pool.find(p=>p.name===n&&eligible(p,slot)&&!taken.has(p.name));
      if(c){out.push(c);break;}
    }
    if(out.length>=2)break;
  }
  return out;
}
function dailyOptionsFor(slot){
  /* seeded board of 5: tiers are drawn with DRAFT_ODDS against the day's OWN bands,
     so every challenge keeps a real rarity curve instead of a flat shuffle */
  const taken=new Set(ALL_SLOTS.map(s=>DD.roster[s]).filter(x=>x!=null).map(id=>DB[id].name));
  const boardNames=new Set(),opts=[];
  /* bond challenges: reserve up to 2 slots for partners so the bond is actually completable */
  dailyBondTargets(slot,taken).slice(0,2).forEach(p=>{
    if(!boardNames.has(p.name)){opts.push(p);boardNames.add(p.name);}
  });
  const bands=dailyBands();
  const eligibleIn=t=>bands[t].filter(p=>eligible(p,slot)&&!taken.has(p.name)&&!boardNames.has(p.name));
  const order=["Icon","Elite","Gold","Silver","Bronze"];
  let guard=0;
  while(opts.length<5&&guard++<200){
    /* roll a band using the draft's rarity odds, then step down if it's empty */
    let r=DD.rng(),acc=0,pick=null;
    for(const t of order){acc+=DRAFT_ODDS[t]||0;if(r<=acc){pick=t;break;}}
    if(!pick)pick="Silver";
    let cands=eligibleIn(pick);
    if(!cands.length){ /* walk outward to the nearest band that has someone */
      const idx=order.indexOf(pick);
      for(let d=1;d<order.length&&!cands.length;d++){
        const lo=order[idx+d],hi=order[idx-d];
        if(lo&&eligibleIn(lo).length){cands=eligibleIn(lo);break;}
        if(hi&&eligibleIn(hi).length){cands=eligibleIn(hi);break;}
      }
    }
    if(!cands.length)break;
    const p=cands[Math.floor(DD.rng()*cands.length)];
    opts.push(p);boardNames.add(p.name);
  }
  return opts;
}
function dailyStart(dateKey){
  dateKey=dateKey||todayKey();
  const {pool,rng}=dailyDraftPool(dateKey);
  DD={dateKey,challenge:dailyFor(dateKey),pool,rng,_bands:null,_reband:undefined,franchise:DD_FRANCHISE,lockedEra:(dailyFor(dateKey).eraLock?viableEras()[dayIndex(dateKey)%viableEras().length]:null),
      stage:"picking",roster:emptyRoster(),taken:[],opts:null,slotOpts:{},activeSlot:null,lastSlot:null,done:false,
      submitted:!!DAILY.history[dateKey]};
}
function dailySlotTap(slot){
  if(!DD||DD.stage!=="picking"||DD.done)return; /* once all 8 are in, the board is locked — no swapping */
  if(DD.roster[slot]!=null)return;
  DD.activeSlot=slot;
  if(!DD.slotOpts[slot])DD.slotOpts[slot]=dailyOptionsFor(slot);
  DD.opts=DD.slotOpts[slot];
  render();
}
function dailyPickInto(pid){
  const slot=DD.activeSlot;if(!slot||DD.roster[slot]!=null)return;
  const p=DB[pid];
  if(DD.taken.some(id=>DB[id].name===p.name)){notice(p.name+" already on your board.");return;}
  DD.roster[slot]=pid;DD.taken.push(pid);DD.lastSlot=slot;DD.activeSlot=null;DD.opts=null;
  const full=STARTER_SLOTS.every(s=>DD.roster[s]!=null)&&BENCH_SLOTS.every(s=>DD.roster[s]!=null);
  if(full){DD.done=true;dailyFinalize();}
  render();

function dailyClearActive(){DD.activeSlot=null;DD.opts=null;render();}
/* ---- rearranging the finished daily board (same rules as Classic Draft) ----
   You can't re-pick a different card, but you CAN move your 8 drafted players
   between slots. Each move re-checks the day's constraint and re-scores. */
function dailyOpenMove(slot){
  if(!DD||!DD.done)return;
  const cur=DB[DD.roster[slot]];
  const fromBench=BENCH_SLOTS.includes(slot);
  const canLand=(mover,dest)=>BENCH_SLOTS.includes(dest)||eligible(mover,dest);
  const legalStarter=s2=>{
    if(s2===slot)return false;
    const occ=DB[DD.roster[s2]];
    return canLand(cur,s2)&&canLand(occ,slot);
  };
  const rows=STARTER_SLOTS.filter(legalStarter).map(s2=>{
    const occ=DB[DD.roster[s2]];
    return `<button class="btn gold" onclick="doDailyMove('${slot}','${s2}')">
      <span>Start at ${SLOT_LABEL[s2]}</span>
      <small style="color:var(--dim)">swaps with ${esc(occ.name)} ${occ.ovr}</small></button>`;
  }).join("");
  let benchRow="";
  if(!fromBench){
    const open=BENCH_SLOTS.find(s2=>DD.roster[s2]==null);
    if(open!=null)benchRow=`<button class="btn" onclick="doDailyMove('${slot}','${open}')"><span>Move to bench</span></button>`;
    else{const t=BENCH_SLOTS.find(s2=>eligible(DB[DD.roster[s2]],slot));
      if(t!=null){const occ=DB[DD.roster[t]];
        benchRow=`<button class="btn" onclick="doDailyMove('${slot}','${t}')"><span>Move to bench</span><small style="color:var(--dim)">swaps with ${esc(occ.name)} ${occ.ovr}</small></button>`;}}
  }
  const none=(rows||benchRow)?"":`<div class="who" style="color:var(--dim)">No legal moves \u2014 nobody else can cover ${SLOT_LABEL[slot]} and ${esc(cur.name)} only fits ${cur.positions.join("/")}.</div>`;
  $("#sheet").innerHTML=`<div class="sheetbox"><h3>Move \u00b7 ${esc(cur.name)} ${cur.ovr}</h3>
    <div class="who">${fromBench?"On the bench":"Starting at "+SLOT_LABEL[slot]}. Rearrange your drafted eight \u2014 whoever's there trades places.</div>
    <div class="swaprows">${rows}${benchRow}</div>${none}<button class="btn" onclick="closeSheet()">Cancel</button></div>`;
  $("#sheet").classList.add("show");
  $("#sheet").onclick=e=>{if(e.target.id==="sheet")closeSheet();};
}
function doDailyMove(a,b){
  const pa=DB[DD.roster[a]],pb=DB[DD.roster[b]];
  if(!eligible(pa,b)||!eligible(pb,a)){notice("Those positions don't fit.");return;}
  [DD.roster[a],DD.roster[b]]=[DD.roster[b],DD.roster[a]];
  DD.lastSlot=b;closeSheet();
  dailyFinalize({rearrange:true}); /* re-check the constraint + re-score with the new arrangement */
  render();
  notice(esc(pa.name)+" \u2192 "+SLOT_LABEL[b]+".");
}
function dailyFinalize(opts){
  const first=!(opts&&opts.rearrange);
  const v=dailyValidity();DD.finalValid=v.valid;
  if(v.valid){const res=dailySubmit();DD.finalResult=res.ok?res:null;
    if(res.ok&&first&&res.result.wins>=70)confetti(70);} /* celebrate once, not on every move */
  else DD.finalResult=null;
}
function dailyStarters(){return STARTER_SLOTS.map(s=>DD.roster[s]!=null?DB[DD.roster[s]]:null).filter(Boolean);}
function dailyValidity(){
  if(!DD)return {full:false,valid:false,reason:"No draft in progress"};
  const full=STARTER_SLOTS.every(s=>DD.roster[s]!=null);
  if(!full)return {full:false,valid:false,reason:"Draft all five starters"};
  const ok=DD.challenge.valid(dailyStarters(),DD.roster);
  return {full:true,valid:ok,reason:ok?"Constraint met":"Constraint not met: "+DD.challenge.hint};
}
function dailyResult(){const o=teamOVR(DD.roster),pr=projection(o.eff);return {ovr:o.total,eff:o.eff,chem:o.chem.bonus,wins:pr.wins,identity:recordIdentity(pr.wins)};}
function dailySubmit(){
  const v=dailyValidity();
  if(!v.valid)return {ok:false,reason:v.reason};
  const r=dailyResult(),key=DD.dateKey,prev=DAILY.lastPlayed;
  if(prev!==key){ /* yesterday relative to the SUBMITTED day, not the wall clock */
    const [yy,mm,ddN]=key.split("-").map(Number);const y=new Date(Date.UTC(yy,mm-1,ddN-1));
    const yKey=y.getUTCFullYear()+"-"+String(y.getUTCMonth()+1).padStart(2,"0")+"-"+String(y.getUTCDate()).padStart(2,"0");
    DAILY.streak=(prev===yKey)?(DAILY.streak+1):1;DAILY.lastPlayed=key;}
  const pb=DAILY.best[key];
  if(!pb||r.wins>pb.wins)DAILY.best[key]={wins:r.wins,ovr:r.ovr,chem:+r.chem.toFixed(1),title:r.identity.title};
  if(!DD.submitted)DAILY.history[key]=(DAILY.history[key]||0)+1; /* count the day once, not per rearrange */
  DD.submitted=true;saveDaily();
  if(typeof trophyRoster==="function")trophyRoster("daily",DD.roster);
  return {ok:true,result:r,best:DAILY.best[key],streak:DAILY.streak};
}

function cardSlug(name){
  return name.toLowerCase()
    .normalize("NFD").replace(/[\u0300-\u036f]/g,"") /* strip accents: Doncic -> doncic */
    .replace(/[.'\u2019]/g,"")      /* drop periods & apostrophes */
    .replace(/[^a-z0-9]+/g,"-")     /* everything else -> hyphen */
    .replace(/^-+|-+$/g,"");
}
function cardArtURL(p){const s=cardSlug(p.name);return CARD_ART.has(s)?CARD_ART_BASE+s+".png":null;}
/* Dev helper: run artStatus() in the console to see coverage + copy-paste slugs.
   Lists how many players have art and prints the slug for any name you pass. */
function artStatus(filter){
  const all=[...new Set(DB.map(p=>p.name))];
  const withArt=all.filter(n=>CARD_ART.has(cardSlug(n)));
  const without=all.filter(n=>!CARD_ART.has(cardSlug(n)));
  console.log(`Card art: ${withArt.length}/${all.length} players covered (${(withArt.length/all.length*100).toFixed(1)}%).`);
  if(filter){const hits=all.filter(n=>n.toLowerCase().includes(filter.toLowerCase()));
    console.log("Slugs for \""+filter+"\":");hits.forEach(n=>console.log("  "+n+"  ->  "+cardSlug(n)+".png"+(CARD_ART.has(cardSlug(n))?"  [HAS ART]":"")));}
  else console.log("Tip: artStatus(\"wade\") to get the exact filename for a player.");
  return {covered:withArt.length,total:all.length,missing:without.length};
}

function hasArt(p){return CARD_ART.has(cardSlug(p.name));}
function cardHTML(p,attrs,badge){
  /* front face: completely clean — no chemistry text */
  const art=cardArtURL(p);
  const front=`
  <div class="card t-${p.tier}${art?" hasart":""}" ${attrs||""}>
    ${art?`<div class="cardart" style="background-image:url('${art}')"></div><div class="cardart-fade"></div>`:""}
    <div class="card-top" style="display:flex;justify-content:space-between;align-items:flex-start">
      <div><div class="ovr">${p.ovr}</div><div class="pos" style="font-size:${p.positions.length>2?7.5:9}px">${p.positions.join("/")}</div></div>
    </div>
    <button class="infobtn" onclick="flip3d(event)" title="Chemistry tags">ⓘ</button>
    ${art?"":`<div class="ini">${initials(esc(p.name))}</div>`}
    <div class="nm">${esc(p.name)}</div>
    <div class="meta">${p.team} · ${p.era} · ${p.tier.toUpperCase()}</div>
    ${badge||""}
  </div>`;
  /* back face: matte-black chemistry dossier */
  const back=`
  <div class="cardback bk-${p.tier}" onclick="flip3d(event)">
    <div class="bk-nm">${esc(p.name)}</div>
    <div class="bk-sub">${p.ovr} OVR · ${p.positions.join("/")} · ${p.team} ${p.era}</div>
    ${tagRow("Era",p.tags.filter(t=>t.startsWith("Era_")))}
    ${tagRow("Playstyle",p.tags.filter(t=>t.startsWith("Style_")))}
    ${tagRow("Storylines",p.tags.filter(t=>t.startsWith("Story_")))}
    <div class="bk-lab">Card</div><div class="bk-val">${p.tier} tier · ${SLOTNAMES(p)}</div>
    <div class="bk-flip">↺ tap to flip back</div>
  </div>`;
  const core=`<div class="c3d"><div class="c3din">
    <div class="c3face c3front">${front}</div>
    <div class="c3face c3back">${back}</div>
  </div></div>`;
  return p.tier==="Icon"?`<div class="flame">${core}</div>`:core;}
function SLOTNAMES(p){return p.positions.length>1?"multi-position":"specialist";}
function flip3d(e){e.stopPropagation();e.preventDefault();
  const n=e.target.closest(".c3din");if(n)n.classList.toggle("flipped3");}
function notice(msg){const n=$("#notice");if(!n)return;n.textContent=msg;
  clearTimeout(notice.t);notice.t=setTimeout(()=>{if($("#notice"))$("#notice").textContent="";},2600);}

/* ================= NAV ================= */
function setScreen(s){screen=s;render();window.scrollTo(0,0);}
function renderTabs(){
  const bar=$("#tabs");if(!bar)return;
  let items;
  if(screen==="landing")items=[];
  else if(screen==="share")items=[["landing","\u2630 Modes"]];
  else if(screen==="draft")items=[["landing","☰ Modes"],["draft","Classic Draft"],["trophies","🏆 Trophies"]];
  else if(screen==="classic")items=[["landing","☰ Modes"],["classic","Pack Mode"],["trophies","🏆 Trophies"]];

function openSheet(pid,side){
  const p=DB[pid];
  $("#sheet").innerHTML=`<div class="sheetbox"><h3>${esc(p.name)} — ${p.ovr} OVR</h3>

  $("#sheet").onclick=e=>{if(e.target.id==="sheet")closeSheet();};
}
function closeSheet(){$("#sheet").classList.remove("show");$("#sheet").innerHTML="";}
function openPicker(side,slot){
  const p=slotPos(slot),cur=S[side].roster[slot];
  const pool=ownedList(side).filter(c=>eligible(c,slot));
  /* players already in OTHER slots are movable straight into this one */
  const rostered=ALL_SLOTS.filter(s=>s!==slot&&S[side].roster[s]!=null)
    .map(s=>({p:DB[S[side].roster[s]],from:s})).filter(x=>eligible(x.p,slot));
  $("#sheet").innerHTML=`<div class="sheetbox">
    <h3>${cur!=null?"Swap":"Select"} ${SLOT_LABEL[slot]}${p!=="B"?` (${p})`:""}</h3>
    <div class="who">${p==="B"?"Any position qualifies for the bench.":`Showing everyone in your collection who can play ${p}.`}
    ${cur!=null?` Currently: <b style="color:var(--ink)">${esc(DB[cur].name)} ${DB[cur].ovr}</b>.`:""}</div>
    ${cur!=null?`<button class="btn danger" onclick="unslot('${side}','${slot}');closeSheet()">Remove ${esc(DB[cur].name)}</button>`:""}
    <div class="pickgrid">${pool.length||rostered.length?
      pool.map(c=>cardHTML(c,`onclick="pickInto(${c.id},'${side}','${slot}')"`)).join("")
      +rostered.map(x=>cardHTML(x.p,`onclick="pickMove(${x.p.id},'${side}','${slot}','${x.from}')"`,
        `<div class="fromtag">AT ${x.from}</div>`)).join("")
      :`<div class="empty">No eligible cards in your collection${p!=="B"?` for ${p}`:""} — open more packs.</div>`}</div>
    <button class="btn" onclick="closeSheet()">Cancel</button></div>`;
  $("#sheet").classList.add("show");
  $("#sheet").onclick=e=>{if(e.target.id==="sheet")closeSheet();};
}
function pickInto(pid,side,slot){place(pid,side,slot);} /* place() closes + rerenders */
function moveInto(pid,side,slot,from){
  const p=DB[pid],r=S[side].roster;
  if(!eligible(p,slot)){notice(`${p.name} plays ${p.positions.join("/")} — can't fill the ${SLOT_LABEL[slot]} slot.`);return false;}
  if(from==="coll"){
    if(rosterHas(r,pid)){notice("That exact card is already in your roster.");return false;}
    if(r[slot]!=null)S[side].coll[r[slot]]=(S[side].coll[r[slot]]||0)+1; // return occupant
    r[slot]=pid;S[side].coll[pid]--;if(S[side].coll[pid]<=0)delete S[side].coll[pid];
  }else{
    if(from===slot)return false;
    const occ=r[slot];
    r[from]=null;
    if(occ!=null){ // swap back if legal, otherwise occupant returns to the collection
      if(eligible(DB[occ],from))r[from]=occ;
      else S[side].coll[occ]=(S[side].coll[occ]||0)+1;
    }
    r[slot]=pid;
  }
  afterRosterChange(side);return true;
}
function place(pid,side,slot){if(moveInto(pid,side,slot,"coll"))closeSheet();}
function pickMove(pid,side,slot,from){if(moveInto(pid,side,slot,from))closeSheet();}
function unslot(side,slot){
  const r=S[side].roster,pid=r[slot];if(pid==null)return;
  r[slot]=null;S[side].coll[pid]=(S[side].coll[pid]||0)+1;afterRosterChange(side);
}
function discard(pid,side){
  S[side].coll[pid]--;if(S[side].coll[pid]<=0)delete S[side].coll[pid];
  closeSheet();save();render();notice(`Discarded ${DB[pid].name}.`);
}
function autoFill(side){
  const r=S[side].roster;
  // pool = everything owned + everything slotted, unique ids
  const pool=new Set(Object.keys(S[side].coll).map(Number));
  ALL_SLOTS.forEach(s=>{if(r[s]!=null)pool.add(r[s]);});
  const players=[...pool].map(id=>DB[id]).sort((a,b)=>b.ovr-a.ovr);
  const fresh=emptyRoster(),used=new Set();
  ["C","PF","SF","SG","PG"].forEach(s=>{
    const p=players.find(x=>!used.has(x.id)&&x.positions.includes(s));
    if(p){fresh[s]=p.id;used.add(p.id);}});
  BENCH_SLOTS.forEach(s=>{const p=players.find(x=>!used.has(x.id));
    if(p){fresh[s]=p.id;used.add(p.id);}});
  // rebuild collection counts: total copies minus the ones slotted
  const counts={};[...pool].forEach(id=>counts[id]=(S[side].coll[id]||0)+(rosterHas(r,id)?1:0));
  used.forEach(id=>counts[id]--);
  S[side].coll={};Object.entries(counts).forEach(([id,n])=>{if(n>0)S[side].coll[id]=n;});
  S[side].roster=fresh;afterRosterChange(side);notice("Best legal lineup set by OVR.");
}
function afterRosterChange(side){
  const t=teamOVR(S[side].roster).total;
  bump(side);save();trophyRoster(side,S[side].roster);render();
  if(t>lastOVR[side]){const el=$("#ovr-"+side);if(el){el.classList.add("bump");setTimeout(()=>el.classList.remove("bump"),260);}}
  lastOVR[side]=t;
}
function confirmReset(side){
  $("#sheet").innerHTML=`<div class="sheetbox"><h3>Start over?</h3>
    <div class="who">This clears your ${side==="rare"?"Rare-Pull":""} collection and roster. Your best OVR high score is kept.</div>
    <button class="btn danger" onclick="doReset('${side}')">Yes — reset everything</button>
    <button class="btn" onclick="closeSheet()">Cancel</button></div>`;
  $("#sheet").classList.add("show");
  $("#sheet").onclick=e=>{if(e.target.id==="sheet")closeSheet();};
}
function doReset(side){
  S[side]=side==="classic"?emptyClassic():emptySide();
  lastOVR[side]=60;save();closeSheet();render();
  notice(side==="classic"?"New Pack Mode run — "+S.classic.cap+" pack budget this time. High score preserved.":"Fresh start. High score preserved.");}
</script>
<script>
/* ================= PACKS SCREEN ================= */

/* ================= REVEAL OVERLAY ================= */
const SUSPENSE={Bronze:350,Silver:500,Gold:900,Elite:1500,Icon:2200};
let REV=null; // {cards, side, packKey, flipped:[]}
let RECENT=(sGet("atu-recent-v1")||[]).map(pk=>Array.isArray(pk)?pk.filter(id=>DB[id]):[]).filter(pk=>pk.length); // ids from the last 2 packs, persisted across resets (stale ids dropped)
/* hydrate the pull-memory randomizer now that storage helpers exist */
try{
  PACK_NO=sGet("atu-packno-v2")||0;
  PULL_AT=sGet("atu-pullhist-v2")||{};
  NAME_PULL_AT=sGet("atu-namehist-v2")||{};
  const dk=sGet("atu-decks-v2");
  if(dk&&typeof dk==="object")TIER_DECKS=dk; /* reconcileDeck() folds in any new cards */
  const df=sGet(DRAFT_FAIR_KEY);
  if(df&&typeof df==="object"){
    DRAFT_FAIR_SESSION=Number.isFinite(df.session)?df.session:0;
    DRAFT_NAME_SHOWN=df.shown&&typeof df.shown==="object"?df.shown:{};
    DRAFT_NAME_LAST=df.last&&typeof df.last==="object"?df.last:{};
    DRAFT_CARD_SHOWN=df.cards&&typeof df.cards==="object"?df.cards:{};
  }
}catch(e){}
function recentSet(){return new Set(RECENT.flat());}
function noteRecent(cards){RECENT.push(cards.map(c=>c.id));RECENT=RECENT.slice(-2);sSet("atu-recent-v1",RECENT);}
function ownedIds(side){
  const ids=new Set(Object.keys(S[side].coll).map(Number));
  ALL_SLOTS.forEach(s=>{if(S[side].roster[s]!=null)ids.add(S[side].roster[s]);});
  return ids;
}
function openPack(packKey,side){
  if(side==="classic"){
    const cl=S.classic;
    if(cl.opened>=cl.cap){notice("Pack budget spent — "+cl.cap+" total. Build your roster from what you pulled.");return;}
    if(packKey==="premium"){if(cl.premiumPacksLeft<=0){notice("Premium pack budget spent — 3 per run.");return;}cl.premiumPacksLeft--;}
    const cards=classicRollPack(ownedIds("classic"),cl.tierCounts,recentSet(),packKey);
    noteRecent(cards);cl.opened++;
    cards.forEach(c=>{cl.coll[c.id]=(cl.coll[c.id]||0)+1;});
    save();trophyPack(cards);
    REV={cards,side:"classic",packKey,dupes:[false,false,false],flipped:[false,false,false],busy:false};
    renderReveal();return;
  }
  const owned=ownedIds(side);
  const cards=rollPack(packKey,owned,recentSet());
  if(!cards)return;
  noteRecent(cards);
  const dupes=cards.map(c=>owned.has(c.id)); /* exact same card already owned */
  cards.forEach((c,i)=>{if(!dupes[i])S[side].coll[c.id]=(S[side].coll[c.id]||0)+1;});
  save();trophyPack(cards);
  REV={cards,side,packKey,flipped:[false,false,false],busy:false,dupes};
  renderReveal();
}
function renderReveal(){

    <h2>${PACKS[REV.packKey].name}${REV.side==="classic"?` — ${S.classic.opened} / ${S.classic.cap}`:""}</h2>
    <div class="pullmsg" id="pullmsg"></div>
    <div class="revealrow">${REV.cards.map((c,i)=>`
      <div class="rslot"><div class="flip ${REV.flipped[i]?"flipped":""}" id="flip${i}">
        <div class="face back g-${c.tier}" onclick="flipCard(${i})">
          <div class="bball"></div><span>TAP TO<br>REVEAL</span>
        </div>
        <div class="face front">${cardHTML(c)}${REV.dupes&&REV.dupes[i]?`<div class="dupetag">EXACT DUPLICATE<br>AUTO-DISCARDED</div>`:""}</div>
      </div></div>`).join("")}
    </div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center">
      ${allDone?`${REV.side==="classic"&&S.classic.opened>=S.classic.cap?"":`<button class="btn primary" onclick="openPack('${REV.packKey}','${REV.side}')">Open another</button>`}
                 <button class="btn" onclick="closeReveal()">Done — to my team</button>`
               :`<button class="btn" onclick="flipAll()">Reveal all</button>`}
    </div>`;

function flipCard(i){
  if(!REV||REV.flipped[i]||REV.busy)return;

function flipAll(){[0,1,2].forEach((i,k)=>setTimeout(()=>{REV&&(REV.busy=false,flipCard(i));},k*250));}
function closeReveal(){const side=REV.side;REV=null;renderReveal();setScreen(side==="rare"?"rare":side==="classic"?"classic":"team");}

/* ================= DRAFT MODE ================= */
/* v35 state invariant: older/touch-interrupted sessions could retain selected IDs
   in D.taken while losing their slot assignment. Rebuild those orphan selections
   into legal empty slots before rendering, then derive completion from the court. */
function reconcileDraftState(){
  D.roster=D.roster||emptyRoster();
  ALL_SLOTS.forEach(s=>{if(!(s in D.roster))D.roster[s]=null;});
  D.taken=Array.isArray(D.taken)?D.taken.filter(id=>DB[id]):[];
  const placedIds=new Set(ALL_SLOTS.map(s=>D.roster[s]).filter(id=>id!=null));
  const placedNames=new Set([...placedIds].map(id=>DB[id].name));
  const orphans=[];
  D.taken.forEach(id=>{const p=DB[id];if(!placedIds.has(id)&&!placedNames.has(p.name)){orphans.push(id);placedNames.add(p.name);}});
  orphans.forEach(id=>{
    const p=DB[id];
    const slot=DRAFT_ORDER.find(s=>D.roster[s]==null&&eligible(p,s));
    if(slot!=null){D.roster[slot]=id;placedIds.add(id);}
  });
  D.taken=ALL_SLOTS.map(s=>D.roster[s]).filter(id=>id!=null);
  const full=ALL_SLOTS.every(s=>D.roster[s]!=null);
  if(full){D.done=true;D.stage="picking";D.activeSlot=null;D.opts=null;}
  else if(D.done)D.done=false;
  return full;
}

/* post-completion rearrangement: tap any player, then send them to any slot

function openDraftSwap(slot){
  const cur=DB[D.roster[slot]];
  const fromBench=BENCH_SLOTS.includes(slot);
  /* A starter destination is only offered when the swap is legal BOTH ways:
     the mover fits the destination AND the occupant fits this vacated slot.
     (Bench slots accept anyone, so a bench origin/target always fits.) */
  const canLand=(mover,dest)=>BENCH_SLOTS.includes(dest)||eligible(mover,dest);
  const legalStarter=s2=>{
    if(s2===slot)return false;
    const occ=DB[D.roster[s2]];
    return canLand(cur,s2)&&canLand(occ,slot); /* two-way check */
  };
  const starterDests=STARTER_SLOTS.filter(legalStarter);
  const rows=starterDests.map(s2=>{
    const occ=DB[D.roster[s2]];
    return `<button class="btn gold" onclick="doDraftSwap('${slot}','${s2}')">
      <span>Start at ${SLOT_LABEL[s2]}</span>
      <small style="color:var(--dim)">swaps with ${esc(occ.name)} ${occ.ovr}</small></button>`;
  }).join("");
  /* bench action for a starter: prefer an OPEN bench spot (pure move, no displacement);
     otherwise swap with the bench player who can legally start this slot, if any. */
  let benchRow="";

    const open=BENCH_SLOTS.find(s2=>D.roster[s2]==null);
    if(open!=null){
      benchRow=`<button class="btn" onclick="doDraftSwap('${slot}','${open}')"><span>Move to bench</span></button>`;
    }else{
      /* find a bench player who can start the vacated slot (so the swap is legal) */
      const t=BENCH_SLOTS.find(s2=>eligible(DB[D.roster[s2]],slot));
      if(t!=null){const occ=DB[D.roster[t]];
        benchRow=`<button class="btn" onclick="doDraftSwap('${slot}','${t}')"><span>Move to bench</span><small style="color:var(--dim)">swaps with ${esc(occ.name)} ${occ.ovr}</small></button>`;}
    }

  }
  const any=rows||benchRow;
  const none=any?"":`<div class="who" style="color:var(--dim)">No legal moves \u2014 nobody else can cover ${SLOT_LABEL[slot]} and ${esc(cur.name)} only fits ${cur.positions.join("/")}.</div>`;

function doDraftSwap(a,b){

function parseShare(){
  /* new ?share= format, with legacy #s= links still honored */
  let m=/[?&]share=(draft|classic):([0-9x,]+)/.exec(location.search);
  if(!m)m=/#s=(draft|classic)\.([0-9x-]+)/.exec(location.hash);
  if(!m)return null;
  const parts=m[2].split(/[,-]/);
  if(parts.length!==ALL_SLOTS.length)return null;
  const roster=emptyRoster();let any=false;
  for(let i=0;i<ALL_SLOTS.length;i++){

async function shareRosterImage(modeKey){
  const roster=modeKey==="daily"?(DD&&DD.roster):modeKey==="draft"?D.roster:S.classic.roster;
  if(modeKey==="daily"&&(!DD||!DD.done)){notice("Finish today's draft first — then share it.");return;}
  if(modeKey==="draft"&&!D.done){notice("Finish the draft first — then share the squad.");return;}
  if(!startersFull(roster)){notice("Fill your starting five before sharing an image.");return;}
  notice("Rendering your squad…");
  const eraLocked=modeKey==="draft"&&!!DRAFT_ERA;
  const blob=await drawRosterCanvas(modeKey,roster,eraLocked);
  if(!blob){notice("Couldn't render the image on this browser.");return;}
  const o=teamOVR(roster),pr=projection(o.eff),perfect=pr.wins===82;
  const stem=modeKey==="draft"?"draft":modeKey==="daily"?"daily":"pack-mode";
  const file=new File([blob],`all-time-ultimate-${stem}${(perfect&&!eraLocked)?"-82-0-club":""}.png`,{type:"image/png"});
  const dailyName=modeKey==="daily"&&DD?DD.challenge.name:"";
  const text=(perfect&&!eraLocked)?"I made the 82–0 Club. Beat this squad:\nPackEmUltimateTeam.com"
    :eraLocked?`My ${eraLabel(DRAFT_ERA)} Era squad (${pr.wins} wins) \u2014 beat it:\nPackEmUltimateTeam.com`
    :modeKey==="daily"?`Today\u2019s ${dailyName} challenge \u2014 ${pr.wins} wins. Beat it:\nPackEmUltimateTeam.com`
    :"my squad - beat it:\nPackEmUltimateTeam.com";
  const shareTitle=(perfect&&!eraLocked)?"All-Time Ultimate — 82–0 Club":eraLocked?`All-Time Ultimate — ${eraLabel(DRAFT_ERA)} Era`:"All-Time Ultimate";
  if(navigator.canShare&&navigator.canShare({files:[file]})){
    try{await navigator.share({files:[file],title:shareTitle,text});return;}catch(e){}
  }
  try{await navigator.clipboard.write([new ClipboardItem({"image/png":blob})]);
    notice(perfect?"82–0 Club image copied — paste it anywhere.":"Squad image copied — paste it anywhere.");return;}catch(e){}
  if(URL.createObjectURL){
    const a=document.createElement("a");a.href=URL.createObjectURL(blob);
    a.download=file.name;document.body.appendChild(a);a.click();a.remove();
    notice(perfect?"82–0 Club image downloaded.":"Squad image downloaded.");return;}
  notice("Couldn't export the image on this browser.");
}

/* neon squad web: blue lines between starters sharing a chemistry tag or team core */
const WEB_COLORS={team:"#ffc53d",duo:"#ff4d6d",story:"#ff7ac8",era:"#35d6ff",style:"#39ff9c"};
/* glow strength ascends with chemistry rank */
/* layered stroke bloom per rank — painted directly into the web (no CSS filters,
   which iOS Safari drops on SVG children). Widest soft halo → mid glow → crisp core,
   ascending strength by rank, same soft-rim feel as the Icon cards. */
/* uniform neon bloom for all lit segments (Icon-rim style, per-link color)
   via SVG-native feGaussianBlur — renders on every browser incl. iOS Safari. */
function pairLinkKind(a,b){ /* strongest shared chemistry between two starters */
  if(a.name===b.name)return null; /* two versions of one player never link */
  if(a.team===b.team)return "team";
  if(DUO_PAIRS.has(a.name+"|"+b.name))return "duo";
  let era=false,style=false;
  for(const t of a.tags){if(!b.tags.includes(t))continue;
    if(t.startsWith("Story_"))return "story";
    if(t.startsWith("Era_"))era=true;else style=true;}
  return era?"era":style?"style":null;
}
function pairLinked(a,b){return !!pairLinkKind(a,b);}
function drawSquadWeb(){
  const svg=$(".squadweb");if(!svg)return;
  const court=svg.closest(".court"),cr=court.getBoundingClientRect();
  if(cr.width)svg.setAttribute("viewBox",`0 0 ${cr.width} ${cr.height}`);
  const roster=screen==="draft"?D.roster:screen==="daily"?(DD?DD.roster:emptyRoster()):screen==="share"&&SHARED?SHARED.roster:S[sideFor(screen)].roster;
  const pts={};
  STARTER_SLOTS.forEach(s=>{const el=court.querySelector(".slot-"+s);if(!el)return;
    const r=el.getBoundingClientRect();
    pts[s]={x:r.left-cr.left+r.width/2,y:r.top-cr.top+r.height/2};});
  const fw=(cr.width||600),fh=(cr.height||400);
  const defs=`<defs><filter id="webneon" filterUnits="userSpaceOnUse" x="-60" y="-60" width="${(fw+120).toFixed(0)}" height="${(fh+120).toFixed(0)}">
    <feGaussianBlur in="SourceGraphic" stdDeviation="4.5" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter></defs>`;
  let grey="",blue="";
  for(let i=0;i<STARTER_SLOTS.length;i++)for(let j=i+1;j<STARTER_SLOTS.length;j++){
    const A=STARTER_SLOTS[i],B=STARTER_SLOTS[j],p1=pts[A],p2=pts[B];
    if(!p1||!p2)continue;
    const seg=(cls,st)=>`<line x1="${p1.x.toFixed(1)}" y1="${p1.y.toFixed(1)}" x2="${p2.x.toFixed(1)}" y2="${p2.y.toFixed(1)}" ${st}/>`;
    grey+=seg("g",'stroke="#6b6b74" stroke-width="1.5" opacity="0.22"'); /* cool-grey web, always present */
    if(roster[A]!=null&&roster[B]!=null){
      const k=pairLinkKind(DB[roster[A]],DB[roster[B]]);
      if(k){const c=WEB_COLORS[k];
        blue+=seg("core-"+k,`class="core-${k}" stroke="${c}" stroke-width="3" opacity="0.9" stroke-linecap="round" filter="url(#webneon)"`);}
    }
  }
  svg.innerHTML=defs+grey+blue;
}
window.addEventListener("resize",()=>drawSquadWeb());
