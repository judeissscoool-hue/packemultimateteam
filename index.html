<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALL-TIME ULTIMATE — NBA Pack Opener</title>
<style>
/* ============ TOKENS: arena at night ============ */
:root{
  --bg:#121212; --panel:#171717; --panel2:#131313; --line:rgba(255,255,255,.08);
  --ink:#f2f2f5; --dim:#9a9aa5; --cyan:#35d6ff; --amber:#f2a93b; --green:#39ff9c;
  --bronze:#c08552; --silver:#c7cedb; --gold:#ffc53d; --elite:#ff4d6d;
  --icon1:#ffd7ef; --icon2:#ff7ac8; --icon3:#ffffff;
  --disp:'Impact','Haettenschweiler','Arial Narrow Bold','Arial Black',sans-serif;
  --body:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--ink);font-family:var(--body);min-height:100%}
body{background:
  radial-gradient(1200px 800px at 50% 0%, #1d1d1d 0%, #151515 45%, var(--bg) 100%);
  overflow-x:hidden}
body::before,body::after{content:"";position:fixed;border-radius:50%;filter:blur(70px);
  z-index:-1;pointer-events:none;opacity:.8}
body::before{width:560px;height:560px;left:-180px;top:12%;
  background:radial-gradient(circle,rgba(53,214,255,.10),transparent 65%);animation:drift1 26s ease-in-out infinite}
body::after{width:640px;height:640px;right:-220px;top:48%;
  background:radial-gradient(circle,rgba(255,122,200,.09),transparent 65%);animation:drift2 32s ease-in-out infinite}
@keyframes drift1{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(140px,-90px) scale(1.15)}}
@keyframes drift2{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-160px,110px) scale(1.12)}}
#neonart{position:fixed;inset:0;z-index:-2;pointer-events:none}
#neonart svg{width:100%;height:100%;display:block}
#neonart .glow-cyan{color:var(--cyan);filter:drop-shadow(0 0 7px var(--cyan))}
#neonart .glow-pink{color:#ff5cb8;filter:drop-shadow(0 0 7px #ff5cb8)}
#neonart .glow-green{color:var(--green);filter:drop-shadow(0 0 7px var(--green))}
#arena{position:fixed;inset:0;z-index:-1;pointer-events:none;overflow:hidden}
#arena::before,#arena::after{content:"";position:absolute;left:50%;top:46%;transform:translate(-50%,-50%);
  border-radius:50%;border:1.5px solid rgba(53,214,255,.08);animation:ringpulse 9s ease-in-out infinite}
#arena::before{width:78vmin;height:78vmin}
#arena::after{width:120vmin;height:120vmin;border-color:rgba(57,255,156,.07);animation-delay:-4.5s}
@keyframes ringpulse{0%,100%{transform:translate(-50%,-50%) scale(1);opacity:.7}50%{transform:translate(-50%,-50%) scale(1.06);opacity:1}}
.spark{position:absolute;border-radius:50%;opacity:0;animation:twinkle ease-in-out infinite}
@keyframes twinkle{0%,100%{opacity:0;transform:scale(.4)}50%{opacity:.85;transform:scale(1.4)}}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
h1,h2,h3,.disp{font-family:var(--disp);letter-spacing:.04em;text-transform:uppercase;font-weight:400}

/* ============ APP FRAME ============ */
#app{max-width:1180px;margin:0 auto;padding:12px 14px 90px}
header.top{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:8px 2px 14px;flex-wrap:wrap}
.logo{font-family:var(--disp);font-size:26px;letter-spacing:.06em;text-transform:uppercase;line-height:.95}
.logo em{font-style:normal;color:var(--amber)}
.logo small{display:block;font-family:var(--body);font-size:10px;letter-spacing:.28em;color:var(--dim)}
.hs{font-size:11px;color:var(--dim);text-align:right;line-height:1.5}
.hs b{color:var(--gold);font-family:var(--disp);font-size:15px;letter-spacing:.05em}

nav.tabs{display:flex;gap:6px;position:fixed;bottom:0;left:0;right:0;z-index:40;
  background:linear-gradient(to top,#121212 78%,rgba(18,18,18,0));padding:10px 14px 14px;justify-content:center}
nav.tabs button{flex:0 1 150px;padding:10px 8px;border-radius:10px;background:var(--panel);border:1px solid rgba(255,255,255,.08);
  font-family:var(--disp);letter-spacing:.08em;text-transform:uppercase;font-size:13px;color:var(--dim)}
nav.tabs button.on{color:#0c0c0c;background:var(--cyan);border-color:var(--cyan);box-shadow:0 0 18px rgba(53,214,255,.45)}

.panel{background:var(--panel);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:14px}
.rowhead{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px;gap:8px;flex-wrap:wrap}
.rowhead h2{font-size:18px;color:var(--ink)}
.rowhead .sub{font-size:11px;color:var(--dim)}
.btn{padding:9px 14px;border-radius:9px;background:var(--panel2);border:1px solid var(--line);font-size:13px;color:var(--ink)}
.btn:hover{border-color:var(--cyan)}
.btn.primary{background:var(--cyan);color:#0c0c0c;border-color:var(--cyan);font-family:var(--disp);letter-spacing:.06em;text-transform:uppercase}
.btn.danger{border-color:#5c2233;color:#ff8aa0}
.btn.gold{background:linear-gradient(135deg,#3a2f12,#241d0c);border-color:var(--gold);color:var(--gold)}
.btn:disabled{opacity:.4;cursor:not-allowed}

/* ============ SCOREBOARD (team OVR / chem / projection) ============ */
.scoreboard{display:grid;grid-template-columns:auto 1fr auto;gap:14px;align-items:center}
@media(max-width:820px){.scoreboard{grid-template-columns:auto 1fr}
  .chemlegend{grid-column:1/-1;border-left:none;border-top:1px solid rgba(255,255,255,.08);padding:10px 0 0;min-width:0;
    display:grid;grid-template-columns:1fr 1fr;gap:6px 14px}
  .chemlegend .clg-h{grid-column:1/-1}}
.ovrbig{font-family:var(--disp);font-size:64px;line-height:1;color:var(--gold);text-shadow:0 0 24px rgba(255,197,61,.35);min-width:110px;text-align:center;transition:transform .25s}
.ovrbig.bump{transform:scale(1.18)}
.ovrbig small{display:block;font-size:10px;letter-spacing:.3em;color:var(--dim);font-family:var(--body);margin-top:2px}
.projrow{display:flex;flex-wrap:wrap;gap:14px;font-size:12px;color:var(--dim)}
.projrow b{display:block;color:var(--ink);font-size:15px;font-family:var(--disp);letter-spacing:.05em}
.chemlinks{margin-top:6px;font-size:11px;color:var(--dim);display:flex;gap:6px;flex-wrap:wrap}
.chemlinks span{background:var(--panel2);border:1px solid var(--line);padding:2px 8px;border-radius:20px}
:root{--ck-team:#ffc53d;--ck-story:#ff7ac8;--ck-era:#35d6ff;--ck-style:#39ff9c}
/* chem web segments: icon-rim style bloom, strength ascends with rank */
.squadweb .wl{stroke-linecap:round;animation:webpulse var(--ws,2s) ease-in-out infinite}
.wl-style{stroke-width:2.6;--wo:.6;--wo2:.78;--ws:2.6s;
  filter:drop-shadow(0 0 3px var(--ck-style))}
.wl-era{stroke-width:2.8;--wo:.66;--wo2:.85;--ws:2.2s;
  filter:drop-shadow(0 0 4px var(--ck-era)) drop-shadow(0 0 9px rgba(53,214,255,.45))}
.wl-story{stroke-width:3.4;--wo:.75;--wo2:.95;--ws:1.7s;
  filter:drop-shadow(0 0 6px var(--ck-story)) drop-shadow(0 0 14px rgba(255,122,200,.65))}
.wl-team{stroke-width:4;--wo:.82;--wo2:1;--ws:1.3s;
  filter:drop-shadow(0 0 7px var(--ck-team)) drop-shadow(0 0 18px rgba(255,197,61,.75)) drop-shadow(0 0 30px rgba(255,197,61,.35))}
@keyframes webpulse{0%,100%{opacity:var(--wo,.8)}50%{opacity:var(--wo2,1)}}
.chemlinks span.hot{border-color:var(--amber);color:var(--amber)}
.chemlinks span.story{border-color:#ff7ac8;color:#ffb3e0}
.chemlinks span.ck-team{border-color:var(--ck-team);color:var(--ck-team)}
.chemlinks span.ck-story{border-color:var(--ck-story);color:#ffb3e0}
.chemlinks span.ck-era{border-color:var(--ck-era);color:#8ee6ff}
.chemlinks span.ck-style{border-color:var(--ck-style);color:#8fffc8}
.chemlegend{border-left:1px solid rgba(255,255,255,.08);padding-left:14px;display:flex;flex-direction:column;gap:6px;min-width:200px}
.clg-h{font-size:9px;letter-spacing:.28em;color:var(--dim)}
.clg{display:flex;gap:8px;align-items:flex-start}
.clg i{width:16px;height:3px;border-radius:2px;margin-top:5px;flex:0 0 auto}
.clg.ck-team i{background:var(--ck-team);box-shadow:0 0 10px var(--ck-team),0 0 3px var(--ck-team)}
.clg.ck-story i{background:var(--ck-story);box-shadow:0 0 7px var(--ck-story)}
.clg.ck-era i{background:var(--ck-era);box-shadow:0 0 4px var(--ck-era)}
.clg.ck-style i{background:var(--ck-style);box-shadow:0 0 2.5px var(--ck-style)}
.clg b{font-size:10.5px;display:block;letter-spacing:.04em}
.clg.ck-team b{color:var(--ck-team)}.clg.ck-story b{color:var(--ck-story)}
.clg.ck-era b{color:var(--ck-era)}.clg.ck-style b{color:var(--ck-style)}
.clg span{font-size:8.5px;color:var(--dim);line-height:1.35;display:block}

/* ============ COURT ROSTER ============ */
.court{position:relative;border:1px solid rgba(255,255,255,.09);border-radius:14px;overflow:hidden;
  background:linear-gradient(180deg,rgba(24,24,24,.9) 0%,rgba(17,17,17,.9) 100%);padding:18px 10px 14px;margin-top:12px}
.court::before{content:"";position:absolute;left:50%;top:-90px;transform:translateX(-50%);
  width:340px;height:340px;border-radius:50%;border:2px solid rgba(57,255,156,.12);pointer-events:none}
.court::after{content:"";position:absolute;left:50%;top:0;transform:translateX(-50%);
  width:2px;height:100%;background:rgba(255,255,255,.05);pointer-events:none}
.court h3{position:relative;text-align:center;font-size:12px;letter-spacing:.3em;color:var(--dim);margin-bottom:10px;z-index:2}
.squadweb{position:absolute;inset:0;width:100%;height:100%;z-index:1;pointer-events:none}
.fiveslots,.benchrow,.benchlabel{position:relative;z-index:2}
.fiveslots{position:relative;display:grid;grid-template-areas:". c ." "f1 . f2" "g1 . g2";
  grid-template-columns:1fr 1fr 1fr;gap:8px;justify-items:center}
.slot-C{grid-area:c}.slot-PF{grid-area:f1}.slot-SF{grid-area:f2}.slot-SG{grid-area:g1}.slot-PG{grid-area:g2}
.pickgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(96px,1fr));gap:8px;max-height:52vh;overflow-y:auto;padding:4px 2px}
.pickgrid .card{width:100%}
.coll .c3d,.pickgrid .c3d,.draftopts .c3d,.coll .flame,.pickgrid .flame,.draftopts .flame{width:100%}
.benchrow{display:flex;gap:8px;justify-content:center;margin-top:14px;flex-wrap:wrap}
.benchlabel{width:100%;text-align:center;font-size:10px;letter-spacing:.3em;color:var(--dim);margin-top:12px}

/* ============ CARDS ============ */
.slot{width:104px;min-height:148px;border:1.5px dashed var(--line);border-radius:12px;display:flex;
  align-items:center;justify-content:center;flex-direction:column;gap:4px;color:var(--dim);
  font-size:10px;letter-spacing:.15em;text-transform:uppercase;background:rgba(10,10,10,.45);position:relative;transition:all .18s;font-family:var(--body)}
.slot .postag{font-family:var(--disp);font-size:18px;letter-spacing:.1em;color:#4a4a52}
.slot.eligible{border-color:var(--cyan);color:var(--cyan);box-shadow:0 0 14px rgba(53,214,255,.35);animation:pulse 1s infinite}
.blocked{opacity:.35}
.droptarget{outline:2px dashed var(--cyan);outline-offset:3px;border-radius:14px}
.dragsrc{opacity:.45}
.fromtag{position:absolute;top:5px;left:6px;font-size:8px;background:var(--amber);color:#0c0c0c;font-weight:800;border-radius:8px;padding:1px 5px;letter-spacing:.05em}
@keyframes pulse{0%,100%{box-shadow:0 0 8px rgba(53,214,255,.25)}50%{box-shadow:0 0 20px rgba(53,214,255,.6)}}

.card{width:104px;height:158px;border-radius:12px;padding:7px 7px 6px;position:relative;display:flex;flex-direction:column;
  background:var(--panel2);border:1.5px solid var(--line);user-select:none;cursor:pointer;overflow:hidden;transition:transform .12s}
.card:active{transform:scale(.96)}
.card .ovr{font-family:var(--disp);font-size:26px;line-height:1;letter-spacing:.02em}
.card .pos{letter-spacing:.08em;color:var(--dim);white-space:nowrap}
.card .ini{margin:4px auto 2px;width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-family:var(--disp);font-size:17px;background:#0d0d0d;border:1.5px solid var(--line);letter-spacing:.02em}
.card .nm{font-size:10.5px;font-weight:700;text-align:center;line-height:1.15;margin-top:auto;min-height:24px;display:flex;align-items:center;justify-content:center}
.card .meta{font-size:8px;color:var(--dim);text-align:center;letter-spacing:.06em;margin-top:2px}
/* ---- 3D flip structure ---- */
.c3d{perspective:800px;position:relative}
.c3din{position:relative;transform-style:preserve-3d;transition:transform .45s cubic-bezier(.3,.8,.3,1)}
.c3din.flipped3{transform:rotateY(180deg)}
.c3face{backface-visibility:hidden;-webkit-backface-visibility:hidden}
.c3front{position:relative}
.c3back{position:absolute;inset:0;transform:rotateY(180deg)}
.infobtn{position:absolute;top:4px;right:5px;width:17px;height:17px;border-radius:50%;z-index:5;
  font-size:11px;line-height:15px;text-align:center;color:var(--dim);
  border:1px solid rgba(255,255,255,.18);background:rgba(0,0,0,.4);padding:0}
.infobtn:hover{color:var(--cyan);border-color:var(--cyan)}
.cardback{width:100%;height:100%;border-radius:12px;background:#121212;border:1.5px solid rgba(255,255,255,.14);
  padding:8px 8px 6px;display:flex;flex-direction:column;gap:2px;cursor:pointer;overflow:hidden;text-align:left}
.cardback .bk-nm{font-family:var(--disp);font-size:11px;letter-spacing:.05em;text-transform:uppercase}
.cardback .bk-sub{font-size:7px;color:var(--dim);margin-bottom:2px}
.cardback .bk-lab{font-size:6.2px;letter-spacing:.22em;text-transform:uppercase;color:#6f6f78;margin-top:3px}
.cardback .bk-val{font-size:7.6px;line-height:1.35;color:var(--ink)}
.cardback .bk-flip{margin-top:auto;font-size:6.5px;letter-spacing:.15em;color:#6f6f78;text-align:center}
.bk-Bronze{border-color:var(--bronze)}.bk-Bronze .bk-nm{color:var(--bronze)}
.bk-Silver{border-color:var(--silver)}.bk-Silver .bk-nm{color:var(--silver)}
.bk-Gold{border-color:var(--gold)}.bk-Gold .bk-nm{color:var(--gold)}
.bk-Elite{border-color:var(--elite)}.bk-Elite .bk-nm{color:var(--elite)}
.bk-Icon{border-color:var(--icon2)}.bk-Icon .bk-nm{color:#ffc4e6}
.card .cnt{position:absolute;top:5px;left:6px;font-size:9px;background:var(--cyan);color:#06121a;font-weight:800;border-radius:8px;padding:1px 5px}

.t-Bronze{border-color:var(--bronze)} .t-Bronze .ovr{color:var(--bronze)} .t-Bronze .ini{border-color:var(--bronze)}
.t-Silver{border-color:var(--silver);background:linear-gradient(160deg,#202024,#131316)} .t-Silver .ovr{color:var(--silver)} .t-Silver .ini{border-color:var(--silver)}
.t-Gold{border-color:var(--gold);background:linear-gradient(160deg,#241d0a,#141210);box-shadow:0 0 10px rgba(255,197,61,.18)}
.t-Gold .ovr{color:var(--gold)} .t-Gold .ini{border-color:var(--gold)}
.t-Elite{border-color:var(--elite);background:linear-gradient(160deg,#2a0f1a,#150b12);box-shadow:0 0 14px rgba(255,77,109,.3)}
.t-Elite .ovr{color:var(--elite)} .t-Elite .ini{border-color:var(--elite);box-shadow:0 0 10px rgba(255,77,109,.5) inset}
.t-Icon{border:2px solid transparent;background:
  linear-gradient(160deg,#241322,#160d18) padding-box,
  linear-gradient(120deg,var(--icon2),var(--icon3),var(--icon1),var(--icon2)) border-box;
  box-shadow:0 0 22px rgba(255,140,205,.55)}
.t-Icon .ovr{background:linear-gradient(180deg,#ffffff,var(--icon2));-webkit-background-clip:text;background-clip:text;color:transparent}
.t-Icon .ini{border-color:var(--icon2);background:#2a1526;color:#ffd7ef}
.t-Icon::after{content:"";position:absolute;top:-60%;left:-60%;width:70%;height:220%;transform:rotate(22deg);
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.32),transparent);animation:sheen 3.2s infinite}
@keyframes sheen{0%{left:-70%}55%{left:130%}100%{left:130%}}
/* pink flame aura wrapping every Icon card */
.flame{position:relative;z-index:0;border-radius:14px}
.flame::before,.flame::after{content:"";position:absolute;z-index:-1;border-radius:18px;pointer-events:none}
.flame::before{inset:-9px;filter:blur(11px);opacity:.75;
  background:conic-gradient(from 0deg,#ff5cb8,#fff,#ff9ad5,#ff2fa4,#ffd7ef,#ff5cb8);
  animation:flamespin 3.2s linear infinite,flick 1.1s ease-in-out infinite}
.flame::after{inset:-4px;filter:blur(4px);opacity:.55;
  background:conic-gradient(from 180deg,#fff,#ff7ac8,#fff0f9,#ff4db0,#fff);
  animation:flamespin 2.1s linear infinite reverse,flick .7s ease-in-out infinite}
@keyframes flamespin{to{transform:rotate(360deg)}}
@keyframes flick{0%,100%{opacity:.55;transform:scale(1) rotate(0)}50%{opacity:.95;transform:scale(1.05)}}

/* ============ COLLECTION ============ */
.coll{display:grid;grid-template-columns:repeat(auto-fill,minmax(104px,1fr));gap:8px;margin-top:10px}
.coll .card{width:100%}
.empty{color:var(--dim);font-size:13px;padding:18px 6px;text-align:center;width:100%}

/* ============ PACK SHELF ============ */
.packs{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:12px}
.pack{background:var(--panel);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:16px;position:relative;overflow:hidden;
  display:flex;flex-direction:column;gap:8px}
.pack h3{font-size:20px}
.pack .odds{font-size:11px;color:var(--dim);line-height:1.7}
.pack .odds i{font-style:normal;display:inline-block;min-width:52px}
.o-Bronze{color:var(--bronze)}.o-Silver{color:var(--silver)}.o-Gold{color:var(--gold)}.o-Elite{color:var(--elite)}.o-Icon{color:#ff9ad5}
.pack .guar{font-size:11px;color:var(--amber);letter-spacing:.04em}
.pack.p-std{border-color:#3a4568}
.pack.p-prem{border-color:var(--elite);box-shadow:0 0 16px rgba(255,77,109,.12) inset}
.pack.p-icon{border-color:var(--gold);box-shadow:0 0 22px rgba(255,197,61,.15) inset}
.pack .btn{margin-top:auto}

/* ============ REVEAL OVERLAY ============ */
#overlay{position:fixed;inset:0;background:rgba(6,6,6,.95);z-index:60;display:none;flex-direction:column;
  align-items:center;justify-content:center;gap:20px;padding:16px}
#overlay.show{display:flex}
#overlay h2{font-size:22px;letter-spacing:.12em;color:var(--dim)}
.revealrow{display:flex;gap:14px;flex-wrap:wrap;justify-content:center}
.rslot{perspective:900px}
.flip{width:118px;height:180px;position:relative;transform-style:preserve-3d;transition:transform .55s cubic-bezier(.2,.7,.3,1.2)}
.flip.flipped{transform:rotateY(180deg)}
.face{position:absolute;inset:0;backface-visibility:hidden;border-radius:12px}
.back{display:flex;align-items:center;justify-content:center;flex-direction:column;gap:6px;cursor:pointer;
  background:linear-gradient(160deg,#1e1e22,#0f0f11);border:1.5px solid rgba(255,255,255,.16);}
.back{color:#8a8a95}
.back .bball{width:46px;height:46px;border-radius:50%;border:2px solid #6b6b76;position:relative}
.back .bball::before{content:"";position:absolute;inset:0;border-radius:50%;
  background:linear-gradient(90deg,transparent 48%,#6b6b76 48% 52%,transparent 52%),
             linear-gradient(0deg,transparent 48%,#6b6b76 48% 52%,transparent 52%)}
.back span{font-size:9px;letter-spacing:.25em}
.back.charging{animation:charge .5s infinite}
.g-Bronze.charging{box-shadow:0 0 14px rgba(192,133,82,.7)}
.g-Silver.charging{box-shadow:0 0 16px rgba(199,206,219,.8)}
.g-Gold.charging{box-shadow:0 0 24px rgba(255,197,61,.9)}
.g-Elite.charging{box-shadow:0 0 30px rgba(255,77,109,1)}
.g-Icon.charging{box-shadow:0 0 46px rgba(255,150,215,1)}
@keyframes charge{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
.front{transform:rotateY(180deg)}
.front .card{width:118px;height:180px;cursor:default}
.dupetag{position:absolute;left:4px;right:4px;bottom:34px;z-index:3;background:rgba(10,10,10,.85);
  border:1px solid rgba(255,138,160,.5);color:#ff8aa0;font-size:8.5px;letter-spacing:.14em;
  text-align:center;padding:4px 2px;border-radius:6px;font-weight:700}
.front .card .ovr{font-size:30px}.front .card .ini{width:52px;height:52px;font-size:20px}
.front .card .nm{font-size:12px}
#bigreveal{position:fixed;inset:0;z-index:80;display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:18px;background:rgba(8,4,10,.82);perspective:1100px;cursor:pointer}
#bigreveal .xlwrap{animation:spinout 1.15s cubic-bezier(.22,.9,.3,1.05) both;transform-style:preserve-3d}

@keyframes flash{0%{opacity:.95}100%{opacity:0}}
.confetti{position:fixed;top:-12px;width:8px;height:14px;z-index:65;pointer-events:none;animation:fall linear forwards}
@keyframes fall{to{transform:translateY(110vh) rotate(720deg);opacity:.2}}
.pullmsg{font-family:var(--disp);font-size:26px;letter-spacing:.1em;color:var(--gold);text-shadow:0 0 20px rgba(255,197,61,.6);min-height:32px;text-align:center}

.pullmsg.elite{color:var(--elite);text-shadow:0 0 26px rgba(255,77,109,.9)}

#sheet{position:fixed;inset:0;background:rgba(5,5,5,.75);z-index:55;display:none;align-items:flex-end;justify-content:center}
#sheet.show{display:flex}
.sheetbox{background:#161616;border:1px solid rgba(255,255,255,.09);border-bottom:none;max-height:88vh;overflow-y:auto;border-radius:16px 16px 0 0;

.sheetbox h3{font-size:18px}
.sheetbox .who{font-size:12px;color:var(--dim);margin-bottom:4px}
.sheetbox .btn{width:100%;text-align:left}

.draftopts{display:grid;grid-template-columns:repeat(auto-fit,minmax(104px,1fr));gap:10px;max-width:640px;margin:12px auto}
.draftopts .card{width:100%}
@keyframes snapin{0%{transform:rotateY(90deg) scale(.55);opacity:0}60%{transform:rotateY(-12deg) scale(1.06);opacity:1}100%{transform:rotateY(0) scale(1)}}

.captainwrap .card{width:clamp(84px,26vw,112px);height:auto;aspect-ratio:104/158}
@keyframes dropIn{from{transform:translateY(-64px);opacity:0}to{transform:translateY(0);opacity:1}}
.dropin{animation:dropIn .62s cubic-bezier(.25,.8,.3,1) both}
/* Icon options spin out like a pack pull instead of fading in */
@keyframes spinIn{0%{transform:scale(.15) rotateY(0deg);opacity:0}

.captainwrap{perspective:900px}

.grid2{display:grid;grid-template-columns:1fr;gap:12px}

const PACKS={

function tierRank(t){return TIER_ORDER.indexOf(t);}
function rollTier(odds,rng){let r=(rng||Math.random)(),acc=0;
  for(const t of TIER_ORDER){if(!odds[t])continue;acc+=odds[t];if(r<acc)return t;}
  // float slack: return best offered tier
  for(let i=TIER_ORDER.length-1;i>=0;i--)if(odds[TIER_ORDER[i]])return TIER_ORDER[i];
}
function pickFrom(arr,rng){return arr[Math.floor((rng||Math.random)()*arr.length)];}
function packUniverse(packKey){return packKey==="rare"?POOL_90:DB;}
/* Fisher-Yates shuffle: every pack draws from a freshly randomized copy of the tier pool */
function fisherYates(arr,rng){
  const a=arr.slice(),R=rng||Math.random;
  for(let i=a.length-1;i>0;i--){const j=Math.floor(R()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}
const COOLDOWN_WEIGHT=0.25; /* players pulled in the last 2 packs are 4x less likely */

  const R=rng||Math.random;
  const wts=pool.map(p=>recent&&recent.has(p.id)?COOLDOWN_WEIGHT:1);
  let r=R()*wts.reduce((a,b)=>a+b,0);
  for(let i=0;i<pool.length;i++){r-=wts[i];if(r<0)return pool[i];}
  return pool[pool.length-1];
}
function rollCard(packKey,excl,recent,rng){
  const t=rollTier(PACKS[packKey].odds,rng);

  if(packKey==="rare")pool=t==="Gold"?POOL_90.filter(p=>p.ovr<=91):POOLS[t];
  else pool=POOLS[t];
  let open=pool.filter(p=>!excl.has(p.id));
  if(!open.length)open=packUniverse(packKey).filter(p=>!excl.has(p.id)); // tier exhausted: widen
  /* tier odds strictly picked the pool; the card comes from a deeply shuffled, cool-down-weighted subset */
  return weightedPick(fisherYates(open,rng),recent,rng);

function rollPack(packKey,owned,recent,rng){

     player stay pullable. Only exact copies are excluded — and once fewer than
     3 unowned cards remain, exact dupes become pullable and are auto-discarded. */
  if(packUniverse(packKey).filter(p=>!excl.has(p.id)).length<3)excl=new Set();
  const cards=[];
  for(let i=0;i<3;i++){const c=rollCard(packKey,excl,rec,rng);cards.push(c);excl.add(c.id);}
  if(pk.guarTier&&!cards.some(c=>tierRank(c.tier)>=tierRank(pk.guarTier))){
    // upgrade the last card to satisfy the guarantee
    const floor=tierRank(pk.guarTier);
    excl.delete(cards[2].id);
    const hi=TIER_ORDER.slice(floor).flatMap(t=>POOLS[t]).filter(p=>!excl.has(p.id));
    if(hi.length)cards[2]=weightedPick(fisherYates(hi,rng),rec,rng);

}

const STARTER_SLOTS=["PG","SG","SF","PF","C"];
const BENCH_SLOTS=["B1","B2","B3"];
const ALL_SLOTS=[...STARTER_SLOTS,...BENCH_SLOTS];
function emptyRoster(){const r={};ALL_SLOTS.forEach(s=>r[s]=null);return r;}
function slotPos(slot){return STARTER_SLOTS.includes(slot)?slot:"B";}

function rosterHas(roster,pid){return ALL_SLOTS.some(s=>roster[s]===pid);}

function chemistry(roster){
  const links=[];
  /* team cores: starters sharing a franchise (strongest link) */
  const counts={};
  STARTER_SLOTS.forEach(s=>{const pid=roster[s];if(pid==null)return;
    const t=DB[pid].team;counts[t]=(counts[t]||0)+1;});
  let team=0;
  Object.entries(counts).forEach(([t,n])=>{
    if(n>=2){const b=(n-1)*1.5;team+=b;links.push({label:t+" Core",n,bonus:b,kind:"team"});}});
  team=Math.min(6,team);
  /* tag synergies: scan starters + bench; unique player NAMES per tag so two
     versions of the same player never self-link */
  /* STARTERS ONLY: the bench is ignored entirely for chemistry */
  const groups={};
  STARTER_SLOTS.forEach(s=>{const pid=roster[s];if(pid==null)return;
    DB[pid].tags.forEach(t=>{(groups[t]=groups[t]||new Set()).add(DB[pid].name);});});
  let tag=0;
  Object.entries(groups).forEach(([t,names])=>{
    const n=names.size;if(n<2)return;
    const w=t.startsWith("Story_")?0.5:0.3; /* rare story links pay more than era/style */
    const b=+((n-1)*w).toFixed(1);
    tag+=b;links.push({label:TAG_LABEL[t]||t,n,bonus:b,
      kind:t.startsWith("Story_")?"story":t.startsWith("Era_")?"era":"style"});});
  tag=Math.min(5,tag);
  links.sort((a,b)=>b.bonus-a.bonus);
  const bonus=+Math.min(10,team+tag).toFixed(1);
  return {bonus,links};
}
function startersFull(roster){return STARTER_SLOTS.every(s=>roster[s]!=null);}
function teamOVR(roster){
  /* starting five = 70% of team OVR, bench = 30% */
  const sv=STARTER_SLOTS.map(s=>roster[s]==null?60:Math.max(60,DB[roster[s]].ovr));
  const bv=BENCH_SLOTS.map(s=>roster[s]==null?60:Math.max(60,DB[roster[s]].ovr));
  const base=(sv.reduce((a,b)=>a+b,0)/5)*0.70+(bv.reduce((a,b)=>a+b,0)/3)*0.30;
  const chem=chemistry(roster);
  const total=Math.max(60,Math.min(99,Math.round(base+chem.bonus)));
  /* effective rating drives the win curve: chemistry counts double there,
     so a lower-OVR team with perfect chem can out-project a chem-less one */
  const eff=base+chem.bonus*2.2; /* chemistry multiplier: pushes the win curve directly */
  return {base:Math.round(base),chem,total,eff,ready:startersFull(roster)};
}
/* logistic-style win curve on anchor points with cosine easing between them:
   flat-ish under 75, climbing through the 80s, exploding past 90 */
const PROJ=[[60,15],[70,26],[75,31],[80,38],[84,46],[87,54],[90,65],[92,70],[95,76],[97,78],[99,80],[103,82]];
function projection(eff){
  const e=Math.max(60,Math.min(103,eff));
  let wins=PROJ[PROJ.length-1][1];
  for(let i=0;i<PROJ.length-1;i++){const [a,wa]=PROJ[i],[b,wb]=PROJ[i+1];
    if(e<=b){const t=(e-a)/(b-a),s=(1-Math.cos(Math.PI*t))/2; /* smooth, non-linear */
      wins=Math.round(wa+(wb-wa)*s);break;}}
  wins=Math.max(12,Math.min(82,wins));
  const label=wins<20?"Lottery Team":wins<30?"Rebuilding":wins<40?"Play-In Hopeful":
    wins<47?"Playoff Team":wins<54?"Homecourt Threat":wins<60?"Contender":
    wins<66?"Title Favorite":wins<72?"Juggernaut":"Historic Juggernaut";
  return {wins,losses:82-wins,label};
}

const DRAFT_ODDS={Bronze:.10,Silver:.30,Gold:.49,Elite:.08,Icon:.03};

function draftDowngrade(t,counts){
  const order=["Icon","Elite","Gold"];
  let i=order.indexOf(t);
  while(i>-1&&i<2&&DRAFT_LIMITS[order[i]]&&(counts[order[i]]||0)>=DRAFT_LIMITS[order[i]])i++;

    const pool=POOLS[t].filter(p=>!takenIds.includes(p.id)&&!opts.some(o=>o.id===p.id));

  let i=order.indexOf(t);
  while(i>-1&&i<2&&L[order[i]]&&(counts[order[i]]||0)>=L[order[i]])i++;
  return i===-1?t:order[i]||t;
}
function classicRollPack(owned,counts,recent,packKey,rng){
  const odds=packKey==="premium"?CLASSIC_PREMIUM_ODDS:CLASSIC_ODDS;
  const excl=new Set(owned||[]),cards=[];
  for(let k=0;k<3;k++){
    let t=classicDowngrade(rollTier(odds,rng),counts);
    let open=POOLS[t].filter(p=>!excl.has(p.id));
    if(!open.length)open=DB.filter(p=>!excl.has(p.id));
    const c=weightedPick(fisherYates(open,rng),recent,rng);
    cards.push(c);excl.add(c.id);
    if(tierRank(c.tier)>=tierRank("Elite"))counts[c.tier]=(counts[c.tier]||0)+1;
  }
  /* mandatory role-player distribution: every pack carries at least one Silver-or-lower */
  if(!cards.some(c=>tierRank(c.tier)<=tierRank("Silver"))){
    const low=[...POOLS.Bronze,...POOLS.Silver].filter(p=>!excl.has(p.id)&&p.id!==cards[2].id);
    if(low.length){
      if(tierRank(cards[2].tier)>=tierRank("Elite"))counts[cards[2].tier]--;
      cards[2]=weightedPick(fisherYates(low,rng),recent,rng);
    }
  }
  return cards;
}
/* DRAFT MODE: slot-eligible option sets (5 varied, unique players) */
function draftOptionsFor(slot,takenIds,counts,rng){
  const opts=[];let guard=0;
  while(opts.length<5&&guard++<500){
    const t=draftDowngrade(rollTier(DRAFT_ODDS,rng),counts||{});
    const pool=POOLS[t].filter(p=>eligible(p,slot)&&!takenIds.includes(p.id)
      &&!opts.some(o=>o.id===p.id||o.name===p.name));
    if(pool.length)opts.push(pickFrom(fisherYates(pool,rng),rng));
  }
  return opts;
}
/* shared Captain Pack helper (Draft + Classic): 3 distinct players, unique names,
   not already owned; each rolled Icon 35% / Elite 65% — guaranteed Elite floor */
function classicCaptainOptions(owned,rng){
  const r=rng||Math.random,excl=owned||new Set(),out=[],seen=new Set();
  let guard=0;

    if(pool.length){const p=pickFrom(fisherYates(pool,rng),rng);out.push(p);seen.add(p.name);}
  }
  return out;
}
function captainOptions(rng){ /* legacy 5-pure-Icon picker — kept, no longer called */
  const seen=new Set(),out=[];
  fisherYates(POOLS.Icon,rng).forEach(p=>{if(out.length<5&&!seen.has(p.name)){seen.add(p.name);out.push(p);}});

}

function pickInto(pid,side,slot){place(pid,side,slot);} /* place() closes + rerenders */
function moveInto(pid,side,slot,from){
  const p=DB[pid],r=S[side].roster;

    if(rosterHas(r,pid)){notice("That exact card is already in your roster.");return false;}
    if(r[slot]!=null)S[side].coll[r[slot]]=(S[side].coll[r[slot]]||0)+1; // return occupant
    r[slot]=pid;S[side].coll[pid]--;if(S[side].coll[pid]<=0)delete S[side].coll[pid];
  }else{
    if(from===slot)return false;
    const occ=r[slot];
    r[from]=null;
    if(occ!=null){ // swap back if legal, otherwise occupant returns to the collection
      if(eligible(DB[occ],from))r[from]=occ;
      else S[side].coll[occ]=(S[side].coll[occ]||0)+1;
    }
    r[slot]=pid;
  }
  afterRosterChange(side);return true;
}
function place(pid,side,slot){if(moveInto(pid,side,slot,"coll"))closeSheet();}

function unslot(side,slot){

function autoFill(side){
  const r=S[side].roster;
  // pool = everything owned + everything slotted, unique ids
  const pool=new Set(Object.keys(S[side].coll).map(Number));
  ALL_SLOTS.forEach(s=>{if(r[s]!=null)pool.add(r[s]);});
  const players=[...pool].map(id=>DB[id]).sort((a,b)=>b.ovr-a.ovr);
  const fresh=emptyRoster(),used=new Set();
  ["C","PF","SF","SG","PG"].forEach(s=>{
    const p=players.find(x=>!used.has(x.id)&&x.positions.includes(s));
    if(p){fresh[s]=p.id;used.add(p.id);}});
  BENCH_SLOTS.forEach(s=>{const p=players.find(x=>!used.has(x.id));
    if(p){fresh[s]=p.id;used.add(p.id);}});
  // rebuild collection counts: total copies minus the ones slotted
  const counts={};[...pool].forEach(id=>counts[id]=(S[side].coll[id]||0)+(rosterHas(r,id)?1:0));
  used.forEach(id=>counts[id]--);
  S[side].coll={};Object.entries(counts).forEach(([id,n])=>{if(n>0)S[side].coll[id]=n;});
  S[side].roster=fresh;afterRosterChange(side);notice("Best legal lineup set by OVR.");
}

  notice(side==="classic"?"New classic run — "+S.classic.cap+" pack budget this time. High score preserved.":"Fresh start. High score preserved.");}

/* ================= REVEAL OVERLAY ================= */
const SUSPENSE={Bronze:350,Silver:500,Gold:900,Elite:1500,Icon:2200};
let REV=null; // {cards, side, packKey, flipped:[]}
let RECENT=sGet("atu-recent-v1")||[]; // ids from the last 2 packs, persisted across resets
function recentSet(){return new Set(RECENT.flat());}
function noteRecent(cards){RECENT.push(cards.map(c=>c.id));RECENT=RECENT.slice(-2);sSet("atu-recent-v1",RECENT);}
function ownedIds(side){
  const ids=new Set(Object.keys(S[side].coll).map(Number));
  ALL_SLOTS.forEach(s=>{if(S[side].roster[s]!=null)ids.add(S[side].roster[s]);});
  return ids;
}
function openPack(packKey,side){
  if(side==="classic"){
    const cl=S.classic;
    if(cl.opened>=cl.cap){notice("Pack budget spent — "+cl.cap+" total. Build your roster from what you pulled.");return;}
    if(packKey==="premium"){if(cl.premiumPacksLeft<=0){notice("Premium pack budget spent — 3 per classic run.");return;}cl.premiumPacksLeft--;}
    const cards=classicRollPack(ownedIds("classic"),cl.tierCounts,recentSet(),packKey);
    noteRecent(cards);cl.opened++;
    cards.forEach(c=>{cl.coll[c.id]=(cl.coll[c.id]||0)+1;});
    save();
    REV={cards,side:"classic",packKey,dupes:[false,false,false],flipped:[false,false,false],busy:false};
    renderReveal();return;
  }
  const owned=ownedIds(side);
  const cards=rollPack(packKey,owned,recentSet());
  if(!cards)return;
  noteRecent(cards);
  const dupes=cards.map(c=>owned.has(c.id)); /* exact same card already owned */
  cards.forEach((c,i)=>{if(!dupes[i])S[side].coll[c.id]=(S[side].coll[c.id]||0)+1;});
  save();
  REV={cards,side,packKey,flipped:[false,false,false],busy:false,dupes};
  renderReveal();
}
function renderReveal(){
  const o=$("#overlay");
  if(!REV){o.classList.remove("show");o.innerHTML="";render();return;}
  const allDone=REV.flipped.every(Boolean);
  o.innerHTML=`
    <h2>${PACKS[REV.packKey].name}${REV.side==="classic"?` — ${S.classic.opened} / ${S.classic.cap}`:""}</h2>
    <div class="pullmsg" id="pullmsg"></div>
    <div class="revealrow">${REV.cards.map((c,i)=>`
      <div class="rslot"><div class="flip ${REV.flipped[i]?"flipped":""}" id="flip${i}">
        <div class="face back g-${c.tier}" onclick="flipCard(${i})">
          <div class="bball"></div><span>TAP TO<br>REVEAL</span>
        </div>
        <div class="face front">${cardHTML(c)}${REV.dupes&&REV.dupes[i]?`<div class="dupetag">EXACT DUPLICATE<br>AUTO-DISCARDED</div>`:""}</div>
      </div></div>`).join("")}
    </div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center">
      ${allDone?`${REV.side==="classic"&&S.classic.opened>=S.classic.cap?"":`<button class="btn primary" onclick="openPack('${REV.packKey}','${REV.side}')">Open another</button>`}
                 <button class="btn" onclick="closeReveal()">Done — to my team</button>`
               :`<button class="btn" onclick="flipAll()">Reveal all</button>`}
    </div>`;
  o.classList.add("show");
}
function flipCard(i){
  if(!REV||REV.flipped[i]||REV.busy)return;
  REV.busy=true;
  const c=REV.cards[i],el=$("#flip"+i),back=el.querySelector(".back");
  back.classList.add("charging"); // tier-colored glow ramps up before the resolve
  setTimeout(()=>{
    el.classList.add("flipped");REV.flipped[i]=true;REV.busy=false;
    if(c.tier==="Icon"){flashFX();setTimeout(flashFX,450);confetti(160,PAL.icon);
      pullMsg("★ ICON PULL — "+c.name.toUpperCase()+" ★","icon");bigReveal(c);}
    else if(c.tier==="Elite"){flashFX();confetti(110,PAL.elite);
      pullMsg("★ ELITE PULL — "+c.name.toUpperCase()+" ★","elite");}
    if(REV.flipped.every(Boolean))renderReveal();
  },SUSPENSE[c.tier]);
}
function flipAll(){[0,1,2].forEach((i,k)=>setTimeout(()=>{REV&&(REV.busy=false,flipCard(i));},k*250));}
function closeReveal(){const side=REV.side;REV=null;renderReveal();setScreen(side==="rare"?"rare":side==="classic"?"classic":"team");}
function pullMsg(t,cls){const m=$("#pullmsg");if(m){m.textContent=t;m.className="pullmsg "+(cls||"");}}
function bigReveal(c){ // icon pops out front-and-center, spins in huge
  const old=$("#bigreveal");if(old)old.remove();
  const d=document.createElement("div");d.id="bigreveal";
  d.innerHTML=`<div class="xlwrap">${cardHTML(c)}</div><div class="tapnote">TAP TO CONTINUE</div>`;
  const close=()=>{d.remove();clearTimeout(t);};
  d.onclick=close;const t=setTimeout(close,3400);

}
function flashFX(){const f=$("#flashfx");f.classList.remove("go");void f.offsetWidth;f.classList.add("go");}
const PAL={icon:["#ff7ac8","#ffffff","#ffd7ef","#ffb3e6","#fff"],
  elite:["#ff4d6d","#ff8aa0","#ffffff","#ff2447","#ffd0d9"]};
function confetti(n,palette){
  const colors=palette||["#ffc53d","#fff3c9","#ff4d6d","#35d6ff","#c7cedb"];
  for(let i=0;i<n;i++){const d=document.createElement("div");d.className="confetti";

function startDraft(){

  render();

function pickCaptain(pid){
  const p=DB[pid];
  D.tierCounts[p.tier]=(D.tierCounts[p.tier]||0)+1; /* Icon captain spends an Icon slot */
  D.roster[p.pos]=pid;D.taken.push(pid);D.lastSlot=p.pos;D.stage="picking";
  render();
}
function draftSlotTap(slot){
  if(D.stage!=="picking")return;
  if(D.roster[slot]!=null){
    if(D.done){openDraftSwap(slot);return;} /* final board: rearrange freely */
    notice("Draft picks are locked in — fill the empty slots.");return;}
  D.activeSlot=slot;
  D.slotOpts[slot]=D.slotOpts[slot]||draftOptionsFor(slot,D.taken,D.tierCounts); /* cached: no re-roll via Cancel */
  D.opts=D.slotOpts[slot];
  render();
}
function draftCapHit(tier){return DRAFT_LIMITS[tier]&&(D.tierCounts[tier]||0)>=DRAFT_LIMITS[tier];}
function draftPickInto(pid){
  const slot=D.activeSlot;if(!slot||D.roster[slot]!=null)return;
  if(D.taken.includes(pid)){notice(DB[pid].name+" is already on your board.");return;}
  const p=DB[pid];
  if(draftCapHit(p.tier)){notice(p.tier+" cap reached ("+DRAFT_LIMITS[p.tier]+" per draft).");return;}
  if(DRAFT_LIMITS[p.tier])D.tierCounts[p.tier]=(D.tierCounts[p.tier]||0)+1;
  D.roster[slot]=pid;D.taken.push(pid);D.lastSlot=slot;D.activeSlot=null;D.opts=null;
  if(ALL_SLOTS.every(s=>D.roster[s]!=null)){
    D.done=true; /* stay on the court \u2014 no summary screen */
    const o=teamOVR(D.roster),pr=projection(o.eff);
    if(o.total>HS.draft.ovr){HS.draft.ovr=o.total;HS.draft.wins=pr.wins;saveHS();}
    confetti(80);
  }
  render(); /* re-render snaps the card in + relights the chemistry web */
}
/* post-completion rearrangement: tap any player, then send them to any slot
   they're eligible for. The player currently in the destination drops into the
   tapped player's old slot. Starter slots need a position match; the bench takes
   anyone \u2014 so moving a starter down is always legal, and moving a bench player up
   is allowed into any starter slot their position fits. */
function openDraftSwap(slot){
  const cur=DB[D.roster[slot]];
  const fromBench=BENCH_SLOTS.includes(slot);
  /* starter destinations this player legally fits (bench order is meaningless, so
     bench isn't listed slot-by-slot \u2014 it's one "Move to bench" action below) */
  const starterDests=STARTER_SLOTS.filter(s2=>s2!==slot&&eligible(cur,s2));
  const rows=starterDests.map(s2=>{
    const occ=DB[D.roster[s2]];
    return `<button class="btn gold" onclick="doDraftSwap('${slot}','${s2}')">
      Start at ${SLOT_LABEL[s2]}
      <span style="color:var(--dim)">(swaps with ${esc(occ.name)} ${occ.ovr})</span></button>`;
  }).join("");
  /* single bench action for a starter: send to any open bench spot, else the last one */
  let benchRow="";
  if(!fromBench){
    const target=BENCH_SLOTS.find(s2=>D.roster[s2]==null)
      ?? BENCH_SLOTS.reduce((lo,s2)=>DB[D.roster[s2]].ovr<DB[D.roster[lo]].ovr?s2:lo,BENCH_SLOTS[0]);
    const occ=D.roster[target]!=null?DB[D.roster[target]]:null;
    benchRow=`<button class="btn" onclick="doDraftSwap('${slot}','${target}')">
      Move to bench${occ?` <span style="color:var(--dim)">(swaps with ${esc(occ.name)} ${occ.ovr})</span>`:""}</button>`;
  }
  const any=rows||benchRow;
  const none=any?"":`<div class="who" style="color:var(--dim)">No other legal slots \u2014 ${esc(cur.name)} only fits ${cur.positions.join("/")}.</div>`;
  $("#sheet").innerHTML=`<div class="sheetbox"><h3>Move \u00b7 ${esc(cur.name)} ${cur.ovr}</h3>
    <div class="who">${fromBench?"On the bench":"Starting at "+SLOT_LABEL[slot]}. Send them where you want \u2014 whoever's there trades places.</div>
    ${rows}${benchRow}${none}<button class="btn" onclick="closeSheet()">Cancel</button></div>`;
  $("#sheet").classList.add("show");
  $("#sheet").onclick=e=>{if(e.target.id==="sheet")closeSheet();};
}
function doDraftSwap(a,b){
  const pa=DB[D.roster[a]],pb=DB[D.roster[b]];
  /* legal if the moving player fits the destination and the displaced player fits
     the vacated slot (bench always fits, so moving up from bench is fine) */
  if(!eligible(pa,b)||!eligible(pb,a)){notice("Those positions don't fit.");return;}
  [D.roster[a],D.roster[b]]=[D.roster[b],D.roster[a]];
  D.lastSlot=b;closeSheet();
  const o=teamOVR(D.roster),pr=projection(o.eff);
  if(o.total>HS.draft.ovr){HS.draft.ovr=o.total;HS.draft.wins=pr.wins;saveHS();}
  render();
  notice(esc(pa.name)+" \u2192 "+SLOT_LABEL[b]+".");
}

function buildShareURL(modeKey,roster){
  /* scan the 8 active board slots, compress card IDs into one query string */
  const ids=ALL_SLOTS.map(s=>roster[s]==null?"x":roster[s]).join(",");
  return location.origin+location.pathname+"?share="+modeKey+":"+ids;

function parseShare(){
  /* new ?share= format, with legacy #s= links still honored */
  let m=/[?&]share=(draft|classic):([0-9x,]+)/.exec(location.search);
  if(!m)m=/#s=(draft|classic)\.([0-9x-]+)/.exec(location.hash);
  if(!m)return null;
  const parts=m[2].split(/[,-]/);
  if(parts.length!==ALL_SLOTS.length)return null;
  const roster=emptyRoster();let any=false;
  for(let i=0;i<ALL_SLOTS.length;i++){
    if(parts[i]==="x")continue;
    const id=+parts[i];
    if(!Number.isInteger(id)||id<0||id>=DB.length)return null;
    roster[ALL_SLOTS[i]]=id;any=true;
  }
  return any?{mode:m[1],roster}:null;
}

        ?`<div class="${p.tier==="Icon"?"spindrop":"dropin"}" style="animation-delay:${(i*0.22).toFixed(2)}s;opacity:.35;pointer-events:none">${cardHTML(p)}</div>`
        :stagger(p,i,`onclick="draftPickInto(${p.id})"`)).join("")}</div>
      <button class="btn" style="margin:6px 0 18px" onclick="D.activeSlot=null;D.opts=null;render()">Cancel</button>`;
  }
  o.classList.add("show");
}

function render(){

/* neon squad web: blue lines between starters sharing a chemistry tag or team core */
const WEB_COLORS={team:"#ffc53d",story:"#ff7ac8",era:"#35d6ff",style:"#39ff9c"};
/* glow strength ascends with chemistry rank */
/* layered stroke bloom per rank — painted directly into the web (no CSS filters,
   which iOS Safari drops on SVG children). Widest soft halo → mid glow → crisp core,
   ascending strength by rank, same soft-rim feel as the Icon cards. */
/* uniform neon bloom for all lit segments (Icon-rim style, per-link color)
   via SVG-native feGaussianBlur — renders on every browser incl. iOS Safari. */
function pairLinkKind(a,b){ /* strongest shared chemistry between two starters */
  if(a.name===b.name)return null; /* two versions of one player never link */
  if(a.team===b.team)return "team";
  let era=false,style=false;
  for(const t of a.tags){if(!b.tags.includes(t))continue;
    if(t.startsWith("Story_"))return "story";
    if(t.startsWith("Era_"))era=true;else style=true;}
  return era?"era":style?"style":null;
}
function pairLinked(a,b){return !!pairLinkKind(a,b);}
function drawSquadWeb(){
  const svg=$(".squadweb");if(!svg)return;
  const court=svg.closest(".court"),cr=court.getBoundingClientRect();
  if(cr.width)svg.setAttribute("viewBox",`0 0 ${cr.width} ${cr.height}`);
  const roster=screen==="draft"?D.roster:screen==="share"&&SHARED?SHARED.roster:S[sideFor(screen)].roster;
  const pts={};
  STARTER_SLOTS.forEach(s=>{const el=court.querySelector(".slot-"+s);if(!el)return;
    const r=el.getBoundingClientRect();
    pts[s]={x:r.left-cr.left+r.width/2,y:r.top-cr.top+r.height/2};});
  const fw=(cr.width||600),fh=(cr.height||400);
  const defs=`<defs><filter id="webneon" filterUnits="userSpaceOnUse" x="-60" y="-60" width="${(fw+120).toFixed(0)}" height="${(fh+120).toFixed(0)}">
    <feGaussianBlur in="SourceGraphic" stdDeviation="4.5" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter></defs>`;
  let grey="",blue="";
  for(let i=0;i<STARTER_SLOTS.length;i++)for(let j=i+1;j<STARTER_SLOTS.length;j++){
    const A=STARTER_SLOTS[i],B=STARTER_SLOTS[j],p1=pts[A],p2=pts[B];
    if(!p1||!p2)continue;
    const seg=(cls,st)=>`<line x1="${p1.x.toFixed(1)}" y1="${p1.y.toFixed(1)}" x2="${p2.x.toFixed(1)}" y2="${p2.y.toFixed(1)}" ${st}/>`;
    grey+=seg("g",'stroke="#6b6b74" stroke-width="1.5" opacity="0.22"'); /* cool-grey web, always present */
    if(roster[A]!=null&&roster[B]!=null){
      const k=pairLinkKind(DB[roster[A]],DB[roster[B]]);
      if(k){const c=WEB_COLORS[k];
        blue+=seg("core-"+k,`class="core-${k}" stroke="${c}" stroke-width="3" opacity="0.9" stroke-linecap="round" filter="url(#webneon)"`);}
    }
  }
  svg.innerHTML=defs+grey+blue;
}
window.addEventListener("resize",()=>drawSquadWeb());
function initArena(){
  const a=$("#arena");if(!a)return;
  const cols=["#ffffff","#9fe8ff","#ffc4e6","#ffe9a3"];
  for(let i=0;i<26;i++){const s=document.createElement("div");s.className="spark";
    const sz=(1.5+Math.random()*2.5).toFixed(1);
    s.style.width=s.style.height=sz+"px";
    s.style.left=Math.random()*100+"%";s.style.top=Math.random()*100+"%";
    s.style.background=cols[i%cols.length];
    s.style.animationDuration=(2.2+Math.random()*4)+"s";
    s.style.animationDelay=(Math.random()*5)+"s";
    a.appendChild(s);}
}
initArena();
/* init check: a ?share= link bypasses the normal game start and renders the saved roster */
const __sh=parseShare();
if(__sh){SHARED=__sh;screen="share";}
render();
